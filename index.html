<title>ALTEON FLY — F-GRLA</title>
<style>
  :root{
    --bg:#eee9df; --panel:#ffffff; --panel2:#f3efe6; --line:#d9d2c4;
    --ink:#1b2430; --muted:#6b7480; --accent:#2f80b8; --accent2:#2563eb;
    --warn:#b7791f; --danger:#d23b3b; --ok:#0e9d63; --tap:64px;
    --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
    --safe-l:env(safe-area-inset-left,0px); --safe-r:env(safe-area-inset-right,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Arial,sans-serif;
    font-size:17px;line-height:1.35;overflow:hidden;-webkit-text-size-adjust:100%;user-select:none;}
  .hide{display:none!important;}
  #app{display:flex;flex-direction:column;height:100%;}
  header{background:linear-gradient(180deg,#ffffff,#f3efe6);border-bottom:1px solid var(--line);
    padding:calc(var(--safe-t) + 8px) calc(12px + var(--safe-r)) 8px calc(12px + var(--safe-l));
    display:flex;align-items:center;gap:10px;}
  .logo{display:flex;align-items:center;gap:9px;font-weight:800;letter-spacing:.5px;}
  .logo img{width:30px;height:30px;border-radius:7px;}
  .logo b{color:var(--accent);}
  .acft-sel{margin-left:auto;display:flex;align-items:center;gap:8px;}
  select,input,button,textarea{font-family:inherit;font-size:16px;color:var(--ink);}
  select{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px 12px;min-height:48px;font-weight:700;}
  .badge{font-size:13px;font-weight:800;letter-spacing:.6px;padding:6px 11px;border-radius:9px;
    background:#e8f2fb;color:var(--accent);border:1px solid #bcd9ef;white-space:nowrap;}
  main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding:14px calc(14px + var(--safe-r)) 24px calc(14px + var(--safe-l));}
  nav{display:flex;background:#ffffff;border-top:1px solid var(--line);padding-bottom:var(--safe-b);}
  nav button{flex:1;background:none;border:none;color:var(--muted);padding:9px 2px;min-height:var(--tap);
    display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11.5px;font-weight:700;cursor:pointer;
    border-top:3px solid transparent;transition:.12s;}
  nav button .ic{font-size:21px;line-height:1;}
  nav button.on{color:var(--accent);border-top-color:var(--accent);background:#e9f2fb;}
  nav button:active{background:#ece8df;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .card h2{margin:0 0 12px;font-size:15px;letter-spacing:.8px;color:var(--muted);text-transform:uppercase;font-weight:800;}
  .card h3{margin:14px 0 8px;font-size:14px;color:var(--accent2);letter-spacing:.4px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;} .row>*{flex:1;min-width:120px;}
  label.fld{display:flex;flex-direction:column;gap:6px;font-size:13px;color:var(--muted);font-weight:700;}
  .fld input,.fld select{background:var(--panel2);border:1px solid var(--line);border-radius:12px;
    padding:13px 12px;min-height:52px;font-size:18px;font-weight:700;width:100%;}
  .fld input:focus{outline:2px solid var(--accent2);border-color:var(--accent2);}
  .btn{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:14px 16px;min-height:56px;
    font-weight:800;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;color:var(--ink);
    transition:.12s;width:100%;}
  .btn:active{transform:scale(.98);}
  .btn.primary{background:linear-gradient(180deg,#3f97cf,#2f80b8);border-color:#2f80b8;color:#fff;}
  .btn.accent{background:linear-gradient(180deg,#3b82f6,#2563eb);border-color:#2563eb;color:#fff;}
  .btn.ghost{background:transparent;}
  .btn.danger{background:#fdecec;border-color:#f1b4b4;color:#c0392b;}
  .kv{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);}
  .kv:last-child{border-bottom:none;}
  .kv .k{color:var(--muted);font-weight:700;} .kv .v{font-weight:800;font-variant-numeric:tabular-nums;}
  .big{font-size:30px;font-weight:900;font-variant-numeric:tabular-nums;}
  .muted{color:var(--muted);} .note{font-size:12.5px;color:var(--muted);line-height:1.5;}
  hr{border:none;border-top:1px solid var(--line);margin:14px 0;}
  .pill{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:800;}
  .pill.ok{background:#0f2e20;color:var(--ok);border:1px solid #b8e6cf;}
  .pill.bad{background:#fdecec;color:var(--danger);border:1px solid #f1b4b4;}
  .pill.warn{background:#2a1c06;color:var(--warn);border:1px solid #5e451a;}
  .flash{animation:flash .7s infinite;} @keyframes flash{0%,100%{opacity:1}50%{opacity:.35}}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;} @media (max-width:520px){.grid2{grid-template-columns:1fr;}}
  .seatbtn{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:12px;min-height:84px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;font-weight:800;}
  .seatbtn .lbl{font-size:12px;color:var(--muted);} .seatbtn .val{font-size:22px;font-variant-numeric:tabular-nums;}
  .seatbtn.set{border-color:var(--accent);background:#e8f2fb;}
  .planewrap{display:flex;justify-content:center;}
  svg .seat{cursor:pointer;} svg text{user-select:none;}
  .chk-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:8px;-webkit-overflow-scrolling:touch;}
  .chk-tabs button{white-space:nowrap;background:var(--panel2);border:1px solid var(--line);border-radius:12px;
    padding:11px 14px;min-height:50px;font-weight:800;font-size:14px;color:var(--muted);flex:0 0 auto;}
  .chk-tabs button.valid{color:#fff;background:var(--ok);border-color:var(--ok);}
  .chk-tabs button.on:not(.valid):not(.urg){color:var(--ink);background:#ddd6c8;border-color:#c7bfb0;}
  .chk-tabs button.valid.on{box-shadow:0 0 0 2px var(--accent2);}
  .chk-tabs button.urg.on{background:var(--danger);border-color:var(--danger);color:#fff;}
  .progress{height:14px;background:var(--panel2);border-radius:999px;overflow:hidden;border:1px solid var(--line);margin:6px 0 14px;}
  .progress>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;transition:.25s;}
  .chk-item{display:flex;align-items:center;gap:14px;padding:14px 12px;border:1px solid var(--line);border-radius:14px;
    margin-bottom:10px;background:var(--panel2);cursor:pointer;min-height:var(--tap);transition:.12s;}
  .chk-item:active{transform:scale(.995);}
  .chk-item .box{width:34px;height:34px;border-radius:9px;border:2px solid var(--muted);flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;font-size:22px;color:transparent;}
  .chk-item.done{opacity:.5;background:#e3f7ee;border-color:#b8e6cf;}
  .chk-item.done .box{background:var(--ok);border-color:var(--ok);color:#06210f;}
  .chk-item .txt{flex:1;} .chk-item .txt b{display:block;font-size:15.5px;}
  .chk-item .txt span{font-size:13.5px;color:var(--accent2);font-weight:700;}
  .chk-item.done .txt b{text-decoration:line-through;}
  .chk-info{background:#e8f1fb;border:1px solid #bcd7f5;border-radius:12px;padding:10px 12px;margin-bottom:10px;font-size:13.5px;color:#1d4ed8;}
  .modal{position:fixed;inset:0;background:rgba(25,30,40,.45);backdrop-filter:blur(3px);display:flex;align-items:center;
    justify-content:center;z-index:50;padding:16px;}
  .modal .box{background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:18px;width:min(420px,100%);}
  .modal h3{margin:0 0 4px;font-size:18px;}
  .disp{font-size:40px;font-weight:900;text-align:right;background:var(--panel2);border:1px solid var(--line);
    border-radius:14px;padding:14px 18px;margin:12px 0;font-variant-numeric:tabular-nums;min-height:70px;}
  .keys{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .keys button{min-height:62px;font-size:24px;font-weight:800;background:var(--panel2);border:1px solid var(--line);border-radius:14px;}
  .keys button:active{background:#e6e2d8;}
  .modal .actions{display:flex;gap:10px;margin-top:12px;}
  #gpspop,#fuelpop{position:fixed;left:12px;right:12px;bottom:calc(var(--safe-b) + 86px);z-index:60;
    border-radius:18px;padding:14px 16px;box-shadow:0 12px 40px rgba(0,0,0,.18);display:flex;gap:12px;align-items:center;}
  #gpspop{background:linear-gradient(180deg,#eaf2fd,#dcebfb);border:1px solid var(--accent2);}
  #fuelpop{background:linear-gradient(180deg,#fbf3e0,#f5e9c8);border:1px solid var(--warn);}
  #gpspop .t,#fuelpop .t{flex:1;}
  #gpspop .t b,#fuelpop .t b{display:block;font-size:13px;letter-spacing:.5px;}
  #gpspop .t b{color:var(--accent);} #fuelpop .t b{color:var(--warn);}
  #gpspop .t span,#fuelpop .t span{font-size:15px;font-weight:700;}
  #sigpad{width:100%;height:200px;background:#fff;border-radius:14px;touch-action:none;display:block;}
  .chrono{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:7px 9px;min-height:40px;
    font-weight:800;font-size:13px;font-variant-numeric:tabular-nums;color:var(--ink);display:flex;align-items:center;gap:4px;cursor:pointer;white-space:nowrap;}

/* ===== W&B ===== */
function wbInputs(){
  const w=state.wb,p=P().wb;
  return { emptyMass:num(w.emptyMass,p.emptyMass), emptyArm:num(w.emptyArm,p.emptyArm),
    front:num(w.front,0), rear:num(w.rear,0), bag:num(w.bag,0),
    fuelLeft:num(w.fuelLeft,0), fuelRight:num(w.fuelRight,0) };
}
function computeWB(){
  const p=P().wb,i=wbInputs();
  const fuelL=i.fuelLeft+i.fuelRight, fuelKg=fuelL*P().fuelDensity;
  const items=[
    {label:"Masse à vide",mass:i.emptyMass,arm:i.emptyArm},
    {label:"Équipage (AV)",mass:i.front,arm:p.stations[0].arm},
    {label:"Passagers AR",mass:i.rear,arm:p.stations[1].arm},
    {label:"Bagages",mass:i.bag,arm:p.stations[2].arm},
    {label:"Carburant",mass:fuelKg,arm:p.fuel.arm}
  ];
  let mass=0,moment=0; items.forEach(it=>{mass+=it.mass;moment+=it.mass*it.arm;});
  const cg=mass>0?moment/mass:0;
  const zfMass=mass-fuelKg, zfMoment=moment-fuelKg*p.fuel.arm, zfCG=zfMass>0?zfMoment/zfMass:0;
  return { items,fuelL,fuelKg,mass,moment,cg,zfMass,zfCG,maxWeight:p.maxWeight };
}
function pointInPoly(arm,mass,poly){
  let inside=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const xi=poly[i][0],yi=poly[i][1],xj=poly[j][0],yj=poly[j][1];
    if(((yi>mass)!==(yj>mass)) && (arm<(xj-xi)*(mass-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}
function wbValid(){
  const r=computeWB(); if(r.mass<=0) return false; if(r.mass>r.maxWeight+0.5) return false;
  const poly=P().wb.envelope;
  return pointInPoly(r.cg,r.mass,poly) && (r.zfMass>0?pointInPoly(r.zfCG,r.zfMass,poly):true);
}

/* ===== PERFORMANCES ===== */
function isaTempC(altFt){ return 15-1.98*(altFt/1000); }
function pressureAltFt(elevFt,qnh){ return elevFt+(1013.25-num(qnh,1013))*27; }
function densityAltFt(elevFt,qnh,oatC){ const pa=pressureAltFt(elevFt,qnh); return pa+120*(num(oatC,15)-isaTempC(pa)); }
function qfuHead(q){ q=parseInt(q,10); if(!isFinite(q)) return null; let h=(q%36)*10; if(h===0&&q!==0) h=360; return h; }
function normPerf(){ const sf=P().perf.surfaceFactors, def=Object.keys(sf)[0]||"Sèche/Dur"; if(!state.perf) state.perf={}; if(state.perf.mode!=="manuel") state.perf.mode="estim"; ["to","ldg"].forEach(k=>{ const o=state.perf[k]; if(!o||typeof o!=="object") state.perf[k]={icao:"",qfu:"",surface:def,dist:"",man:""}; }); if(!state.perf.to.icao) state.perf.to.icao=((state.meteo.dep||P().aerodrome.icao||"")+"").toUpperCase(); if(!state.perf.ldg.icao) state.perf.ldg.icao=((state.meteo.arr||"")+"").toUpperCase(); }
function windComponents(rwyHdg,windDir,windSpd){
  if(rwyHdg==null||windDir==="VRB"||windDir===""||windDir==null) return {head:0,cross:0,xdir:"—"};
  const ang=(num(windDir)-num(rwyHdg))*Math.PI/180;
  const head=num(windSpd)*Math.cos(ang), cross=num(windSpd)*Math.sin(ang);
  return { head, cross:Math.abs(cross), xdir:cross>=0?"droite":"gauche" };
}
function perfPhase(kind){
  const p=P(),pf=p.perf,wb=computeWB(),ph=state.perf[kind];
  const apt=lookupAirport(ph.icao);
  const elevFt=(apt&&apt.e!=null)?apt.e:p.aerodrome.elevFt;
  /* météo par phase : METAR départ → décollage, METAR arrivée → atterrissage (sinon saisie Vol) */
  const cond=(kind==='to'?state.meteo.depCond:state.meteo.arrCond)||state.meteo;
  const oat=num(cond.temp,isaTempC(0)), qnh=num(cond.qnh,1013);
  const da=densityAltFt(elevFt,qnh,oat), hdg=qfuHead(ph.qfu);
  const wc=windComponents(hdg,cond.windDir,cond.windSpd);
  const surfFactor=pf.surfaceFactors[ph.surface]||1;
  const ref=kind==='to'?pf.takeoff:pf.landing; let base;
  if(state.perf.mode==='manuel'){ base=num(ph.man,0); if(base<=0) base=ref.base50ft_m; }
  else { base=ref.base50ft_m*(1+pf.kPer1000ft*(da/1000))*(1+pf.kPerKgOverRef*Math.max(0,wb.mass-ref.refMass)); }
  if(wc.head>=0) base*=(1-pf.kHeadwindPerKt*wc.head); else base*=(1+pf.kTailwindPerKt*Math.abs(wc.head));
  base*=surfFactor*pf.safetyMargin;
  const dist=Math.max(0,Math.round(base)), avail=num(ph.dist,0);
  return { icao:ph.icao, apt, aptName:(apt?apt.n:'(inconnu)'), elevFt, da:Math.round(da), pa:Math.round(pressureAltFt(elevFt,qnh)),
    hdg, wc, surfFactor, surface:ph.surface, qfu:ph.qfu, dist, avail, ok:avail>0?dist<=avail:null };
}
function computePerf(){ normPerf(); return { to:perfPhase('to'), ldg:perfPhase('ldg'), wb:computeWB(), speeds:P().speeds, oat:num(state.meteo.temp,isaTempC(0)), qnh:num(state.meteo.qnh,1013) }; }

function _hav(a,b,c,d){ const R=6371,t=x=>x*Math.PI/180; const dla=t(c-a),dlo=t(d-b); const s=Math.sin(dla/2)**2+Math.cos(t(a))*Math.cos(t(c))*Math.sin(dlo/2)**2; return 2*R*Math.asin(Math.sqrt(s)); }
function nearbyICAOs(icao,n){ const a=lookupAirport(icao); if(!a) return []; const arr=[]; for(const k in AIRPORTS){ if(k===icao) continue; const b=AIRPORTS[k]; if(b.la==null||b.lo==null) continue; arr.push([k,_hav(a.la,a.lo,b.la,b.lo)]); } arr.sort((x,y)=>x[1]-y[1]); return arr.slice(0,n).map(x=>x[0]); }
async function wxText(url){
  const tries=[url,"https://corsproxy.io/?url="+encodeURIComponent(url),"https://api.allorigins.win/raw?url="+encodeURIComponent(url)];
  for(const u of tries){ try{ const r=await fetch(u,{cache:'no-store'}); if(r.ok){ const t=await r.text(); if(t&&t.trim()) return t.trim(); } }catch(e){} }
  return "";
}
async function metarsJSON(ids){
  const url="https://aviationweather.gov/api/data/metar?ids="+encodeURIComponent(ids)+"&format=json";
  const t=await wxText(url); if(!t) return [];
  try{ const j=JSON.parse(t); if(Array.isArray(j)) return j.map(o=>({id:(o.icaoId||'').toUpperCase(),raw:o.rawOb||''})).filter(o=>o.raw); }catch(e){}
  return t.split("\n").map(s=>s.trim()).filter(Boolean).map(s=>({id:(s.split(/\s+/)[0]||'').toUpperCase(),raw:s}));
}
async function fetchWx(icao){
  icao=(icao||'').toUpperCase().trim();
  const ml=await metarsJSON(icao);
  const metar=(ml.find(o=>o.id===icao)||ml[0]||{}).raw||'';
  let taf=""; const tt=await wxText("https://aviationweather.gov/api/data/taf?ids="+encodeURIComponent(icao)+"&format=json");
  if(tt){ try{ const j=JSON.parse(tt); if(Array.isArray(j)&&j[0]) taf=j[0].rawTAF||''; }catch(e){ taf=tt.split("\n")[0]; } }
  let nearby=[]; const near=nearbyICAOs(icao,6); if(near.length){ const nl=await metarsJSON(near.join(",")); nearby=nl.filter(o=>o.id!==icao).slice(0,4); }
  return { metar:metar, taf:taf, nearby:nearby };
}
function parseMetar(raw){ const o={}; let m;
  m=raw.match(/\b(\d{3}|VRB)(\d{2,3})(?:G\d{2,3})?KT\b/); if(m){ o.windDir=m[1]==='VRB'?'':parseInt(m[1],10); o.windSpd=parseInt(m[2],10); }
  m=raw.match(/\b(M?\d{2})\/(M?\d{2})\b/); if(m){ o.temp=parseInt(m[1].replace('M','-'),10); }
  m=raw.match(/\bQ(\d{3,4})\b/); if(m){ o.qnh=parseInt(m[1],10); } else { m=raw.match(/\bA(\d{4})\b/); if(m){ o.qnh=Math.round(parseInt(m[1],10)/100*33.8639); } }
  return o; }
function applyMetar(o){ if(o.windDir!==undefined) state.meteo.windDir=o.windDir; if(o.windSpd!==undefined) state.meteo.windSpd=o.windSpd; if(o.temp!==undefined) state.meteo.temp=o.temp; if(o.qnh!==undefined) state.meteo.qnh=o.qnh; saveState(); }
async function doWx(which){
  const icao=((which==='dep')?state.meteo.dep:state.meteo.arr||'').trim().toUpperCase();
  const st=document.getElementById('wxStatus');
  if(icao.length<3){ if(st) st.innerHTML='<span class="pill warn">Saisir le code OACI</span>'; return; }
  if(st) st.innerHTML='<span class="pill warn">Recherche '+esc(icao)+'\u2026</span>';
  let wx; try{ wx=await fetchWx(icao); }catch(e){ wx={metar:'',taf:''}; }
  if(!wx.metar && !wx.taf){ if(st) st.innerHTML='<span class="pill warn">Indisponible (hors-ligne / bloqu\u00e9) \u2014 colle le METAR ci-dessous</span>'; return; }
  if(which==='dep'){ state.meteo.rawDep=wx.metar; state.meteo.tafDep=wx.taf; state.meteo.nearbyDep=wx.nearby||[]; } else { state.meteo.rawArr=wx.metar; state.meteo.tafArr=wx.taf; state.meteo.nearbyArr=wx.nearby||[]; }
  if(wx.metar) applyMetar(parseMetar(wx.metar));
  saveState(); renderProfil();
}

/* ===== MÉTÉO : METAR/TAF départ, arrivée + couloir 100 NM (alimente les performances) ===== */
const R_NM=3440.065, _tr=d=>d*Math.PI/180;
function gcDistNM(a,b){ const dla=_tr(b.la-a.la),dlo=_tr(b.lo-a.lo); const s=Math.sin(dla/2)**2+Math.cos(_tr(a.la))*Math.cos(_tr(b.la))*Math.sin(dlo/2)**2; return 2*R_NM*Math.asin(Math.min(1,Math.sqrt(s))); }
function gcBearR(a,b){ const y=Math.sin(_tr(b.lo-a.lo))*Math.cos(_tr(b.la)); const x=Math.cos(_tr(a.la))*Math.sin(_tr(b.la))-Math.sin(_tr(a.la))*Math.cos(_tr(b.la))*Math.cos(_tr(b.lo-a.lo)); return Math.atan2(y,x); }
function crossTrackNM(a,b,p){ const d13=gcDistNM(a,p)/R_NM,b13=gcBearR(a,p),b12=gcBearR(a,b); const xt=Math.asin(Math.sin(d13)*Math.sin(b13-b12)); const at=Math.acos(Math.cos(d13)/Math.cos(xt))*R_NM; return {xt:Math.abs(xt)*R_NM,at}; }
async function metarFull(ids){ const t=await wxText("https://aviationweather.gov/api/data/metar?ids="+encodeURIComponent(ids)+"&format=json&taf=true"); if(!t)return[]; try{const j=JSON.parse(t);return Array.isArray(j)?j:[];}catch(e){return[];} }
async function metarBbox(bbox){ const t=await wxText("https://aviationweather.gov/api/data/metar?bbox="+bbox+"&format=json"); if(!t)return[]; try{const j=JSON.parse(t);return Array.isArray(j)?j:[];}catch(e){return[];} }
function flCat(m){ if(!m) return ["—","#6b7480"]; const c=(m.clouds||[]).filter(x=>/BKN|OVC|VV/.test(x.cover||'')).map(x=>x.base).filter(x=>x!=null); const ceil=c.length?Math.min.apply(null,c):9999; let v=m.visib; v=(typeof v==="string")?(v.indexOf("+")>=0?10:parseFloat(v)):v; if(v==null)v=10;
  if(ceil<500||v<1) return ["LIFR","#a21caf"]; if(ceil<1000||v<3) return ["IFR","#d23b3b"]; if(ceil<3000||v<5) return ["MVFR","#b7791f"]; return ["VFR","#0e9d63"]; }
function condFrom(m){ if(!m)return null; return { windDir:(m.wdir==='VRB'||m.wdir==null)?'':m.wdir, windSpd:m.wspd!=null?m.wspd:'', temp:m.temp!=null?Math.round(m.temp):'', qnh:m.altim!=null?Math.round(m.altim):'' }; }
function wxCardGA(role,m){
  if(!m) return `<div class="card"><h2>${esc(role)}</h2><div class="note">Aucune donnée — lancer « Actualiser ».</div></div>`;
  const fc=flCat(m), taf=m.rawTaf?`<div class="mono" style="margin-top:8px;color:var(--accent2)">TAF ${esc(m.rawTaf)}</div>`:'<div class="note" style="margin-top:6px">TAF indisponible</div>';

function renderMeteoWx(){
  const m=state.meteo; let h=wxCardGA("Départ",m.depM)+wxCardGA("Arrivée",m.arrM);
  const cor=m.corridor||[];
  if(cor.length){ h+=`<div class="card"><h2>En route — couloir 100 NM (${cor.length})</h2>`;
    cor.forEach(x=>{ const fc=flCat(x); h+=`<div class="kv"><span class="k">${esc(x.icaoId)} <span class="muted">${fmt(x._at)} NM · ${fmt(x._xt)} NM axe</span></span><span class="v"><span class="pill" style="background:${fc[1]}22;color:${fc[1]};border:1px solid ${fc[1]}66">${fc[0]}</span></span></div><div class="mono" style="margin:2px 0 8px">${esc(x.rawOb||'')}</div>`; });
    h+=`</div>`; }
  else if(m.depM&&m.arrM) h+=`<div class="card"><div class="note">Aucun terrain rapporteur dans le couloir.</div></div>`;

async function loadMeteo(){
  const st=document.getElementById("mtStatus"); const dep=(state.meteo.dep||'').toUpperCase().trim(), arr=(state.meteo.arr||'').toUpperCase().trim();
  if(st) st.innerHTML='<span class="pill warn">Chargement météo…</span>';
  const ids=[dep,arr].filter(x=>x.length===4);
  try{
    const list=await metarFull(ids.join(",")); const byId={}; list.forEach(x=>byId[x.icaoId]=x);
    state.meteo.depM=byId[dep]||null; state.meteo.arrM=byId[arr]||null;
    const A=lookupAirport(dep),B=lookupAirport(arr); let cor=[];
    if(A&&B&&A.la!=null&&B.la!=null){ const pad=1.2,bbox=[Math.min(A.la,B.la)-pad,Math.min(A.lo,B.lo)-pad,Math.max(A.la,B.la)+pad,Math.max(A.lo,B.lo)+pad].join(",");
      const box=await metarBbox(bbox); const route=gcDistNM({la:A.la,lo:A.lo},{la:B.la,lo:B.lo}); const seen={}; seen[dep]=seen[arr]=1;
      box.forEach(x=>{ if(x.lat==null||seen[x.icaoId])return; const ct=crossTrackNM({la:A.la,lo:A.lo},{la:B.la,lo:B.lo},{la:x.lat,lo:x.lon}); if(ct.xt<=50&&ct.at>=-5&&ct.at<=route+5){ x._at=ct.at;x._xt=ct.xt;cor.push(x);seen[x.icaoId]=1; } });
      cor.sort((a,b)=>a._at-b._at); cor=cor.slice(0,14); }
    state.meteo.corridor=cor;
    /* alimente les performances : météo départ → décollage, arrivée → atterrissage */
    state.meteo.depCond=condFrom(state.meteo.depM); state.meteo.arrCond=condFrom(state.meteo.arrM);
    if(state.meteo.depM){ applyMetar(parseMetar(state.meteo.depM.rawOb||'')); state.meteo.rawDep=state.meteo.depM.rawOb; state.meteo.tafDep=state.meteo.depM.rawTaf||''; }
    if(state.meteo.arrM){ state.meteo.rawArr=state.meteo.arrM.rawOb; state.meteo.tafArr=state.meteo.arrM.rawTaf||''; }
    if(dep) state.perf.to.icao=dep; if(arr) state.perf.ldg.icao=arr;
    saveState();
    if(st) st.innerHTML='<span class="pill ok">Mis à jour '+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})+' · perfos alimentées</span>';
    const wx=document.getElementById("mtWx"); if(wx) wx.innerHTML=renderMeteoWx();
  }catch(e){ if(st) st.innerHTML='<span class="pill bad">Échec — réseau/proxy indisponible (coller un METAR dans l\'onglet Vol)</span>'; }
}

function planeSVG(i){
  function zone(id,l,t,w,h,txt,set){
    return `<div data-seat="${id}" style="position:absolute;left:${l}%;top:${t}%;width:${w}%;height:${h}%;`
      +`display:flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;`
      +`font-weight:800;font-size:12.5px;color:${set?'#1a5a86':'#5b6b85'};`
      +`border:${set?'2px solid #2f80b8':'1.5px dashed rgba(47,128,184,.5)'};`
      +`background:${set?'rgba(47,128,184,.18)':'rgba(47,128,184,.06)'};">${txt}</div>`;
  }
  const kg=v=>v>0?fmt(v)+' kg':'+', L=v=>v>0?fmt(v)+' L':'+';
  return `<div style="position:relative;width:100%;max-width:560px;margin:4px auto 2px">`
    +`<img src="${PLANE_IMG}" alt="Vue de dessus avion" style="width:100%;display:block;border-radius:14px;background:#fff">`
    +zone('fuelL',18,38,13,9,L(i.fuelLeft),i.fuelLeft>0)
    +zone('fuelR',69,38,13,9,L(i.fuelRight),i.fuelRight>0)
    +zone('front',43,30,14,10,kg(i.front),i.front>0)
    +zone('rear',43,45,14,9,kg(i.rear),i.rear>0)
    +zone('bag',45,55,11,5,kg(i.bag),i.bag>0)
    +`</div>`;
}

function routeSVG(){
  const pts=[];
  const dep=lookupAirport((state.meteo.dep||'').toUpperCase());
  if(dep) pts.push({la:dep.la,lo:dep.lo,nm:(state.meteo.dep||'').toUpperCase(),t:'dep'});
  (state.navlog||[]).forEach(L=>{ const la=parseFloat(L.lat),lo=parseFloat(L.lon); if(isFinite(la)&&isFinite(lo)) pts.push({la:la,lo:lo,nm:((L.wpt||'').toUpperCase()).slice(0,12),t:'wp'}); });
  const arr=lookupAirport((state.meteo.arr||'').toUpperCase());
  if(arr) pts.push({la:arr.la,lo:arr.lo,nm:(state.meteo.arr||'').toUpperCase(),t:'arr'});
  if(pts.length<2) return '<div class="note">Trajet indisponible : saisissez les aérodromes de départ et d\'arrivée (onglet Vol), et éventuellement des points avec coordonnées.</div>';
  const W=600,H=380,pad=46;
  const meanLa=pts.reduce((a,p)=>a+p.la,0)/pts.length, kx=Math.cos(meanLa*Math.PI/180);
  const xs=pts.map(p=>p.lo*kx), ys=pts.map(p=>p.la);
  let minX=Math.min.apply(null,xs),maxX=Math.max.apply(null,xs),minY=Math.min.apply(null,ys),maxY=Math.max.apply(null,ys);
  const dx=(maxX-minX)||0.02, dy=(maxY-minY)||0.02, sc=Math.min((W-2*pad)/dx,(H-2*pad)/dy);
  const cx=(minX+maxX)/2, cy=(minY+maxY)/2;
  const px=x=>W/2+(x-cx)*sc, py=y=>H/2-(y-cy)*sc;
  const P2=pts.map(p=>({x:px(p.lo*kx),y:py(p.la),nm:p.nm,t:p.t}));
  const line=P2.map(q=>q.x.toFixed(1)+','+q.y.toFixed(1)).join(' ');
  let dots='';
  P2.forEach(q=>{ const col=q.t==='dep'?'#2f80b8':(q.t==='arr'?'#2563eb':'#6b7480'), rad=q.t==='wp'?4:7;
    const right=q.x>W-90, lx=right?q.x-9:q.x+9, anc=right?'end':'start';
    dots+='<circle cx="'+q.x.toFixed(1)+'" cy="'+q.y.toFixed(1)+'" r="'+rad+'" fill="'+col+'" stroke="#fff" stroke-width="1.5"/>';
    dots+='<text x="'+lx.toFixed(1)+'" y="'+(q.y-9).toFixed(1)+'" font-size="13" font-weight="700" fill="#1b2430" text-anchor="'+anc+'">'+esc(q.nm)+'</text>';
  });
  let gps='';
  if(typeof gpsLast!=='undefined' && gpsLast && isFinite(gpsLast.lat)){ const gx=px(gpsLast.lon*kx), gy=py(gpsLast.la!=null?gpsLast.la:gpsLast.lat);
    if(gx>=0&&gx<=W&&gy>=0&&gy<=H) gps='<circle cx="'+gx.toFixed(1)+'" cy="'+gy.toFixed(1)+'" r="6" fill="#d23b3b" stroke="#fff" stroke-width="2"/><text x="'+(gx+9).toFixed(1)+'" y="'+(gy+4).toFixed(1)+'" font-size="12" font-weight="700" fill="#d23b3b">avion</text>'; }
  let totNM=0; for(let i=1;i<pts.length;i++) totNM+=_hav(pts[i-1].la,pts[i-1].lo,pts[i].la,pts[i].lo)/1.852;
  const planned=(state.navlog||[]).some(L=>isFinite(parseFloat(L.lat))&&isFinite(parseFloat(L.lon)));
  return '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:540px;background:#f3efe6;border:1px solid #d9d2c4;border-radius:12px">'

function _merX(lon,z){ return (lon+180)/360*256*Math.pow(2,z); }
function _merY(lat,z){ const r=lat*Math.PI/180; return (1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2*256*Math.pow(2,z); }
function _routePts(){
  const pts=[];
  const dep=lookupAirport((state.meteo.dep||'').toUpperCase());
  if(dep) pts.push({la:dep.la,lo:dep.lo,nm:(state.meteo.dep||'').toUpperCase(),t:'dep'});
  (state.navlog||[]).forEach(L=>{ const la=parseFloat(L.lat),lo=parseFloat(L.lon); if(isFinite(la)&&isFinite(lo)) pts.push({la:la,lo:lo,nm:((L.wpt||'').toUpperCase()).slice(0,12),t:'wp'}); });

  if(arr) pts.push({la:arr.la,lo:arr.lo,nm:(state.meteo.arr||'').toUpperCase(),t:'arr'});
  return pts;
}
function routeMap(){
  const pts=_routePts();
  if(pts.length<2) return '<div class="note">Trajet indisponible : saisissez les aérodromes de départ et d\'arrivée (onglet Vol), et éventuellement des points avec coordonnées.</div>';
  const W=600,H=380,pad=44;
  const las=pts.map(p=>p.la),los=pts.map(p=>p.lo);
  const minLa=Math.min.apply(null,las),maxLa=Math.max.apply(null,las),minLo=Math.min.apply(null,los),maxLo=Math.max.apply(null,los);
  let z=2; for(z=16; z>=2; z--){ const w=_merX(maxLo,z)-_merX(minLo,z), h=_merY(minLa,z)-_merY(maxLa,z); if(w<=W-2*pad && h<=H-2*pad) break; }
  const cX=(_merX(minLo,z)+_merX(maxLo,z))/2, cY=(_merY(minLa,z)+_merY(maxLa,z))/2;
  const oX=cX-W/2, oY=cY-H/2, n=Math.pow(2,z);
  const tx0=Math.floor(oX/256), ty0=Math.floor(oY/256), tx1=Math.floor((oX+W)/256), ty1=Math.floor((oY+H)/256);
  let tiles='';
  for(let tx=tx0;tx<=tx1;tx++) for(let ty=ty0;ty<=ty1;ty++){
    if(ty<0||ty>=n) continue; const wx=((tx%n)+n)%n;
    tiles+='<img src="https://tile.openstreetmap.org/'+z+'/'+wx+'/'+ty+'.png" style="position:absolute;left:'+(tx*256-oX).toFixed(0)+'px;top:'+(ty*256-oY).toFixed(0)+'px;width:256px;height:256px" alt="">';
  }
  const sp=pts.map(p=>({x:_merX(p.lo,z)-oX,y:_merY(p.la,z)-oY,nm:p.nm,t:p.t}));
  const line=sp.map(q=>q.x.toFixed(1)+','+q.y.toFixed(1)).join(' ');
  let dots='';
  sp.forEach(q=>{ const col=q.t==='dep'?'#2f80b8':(q.t==='arr'?'#1d4ed8':'#444'), rad=q.t==='wp'?4:7;
    const right=q.x>W-100, lx=right?q.x-10:q.x+10, anc=right?'end':'start';
    dots+='<circle cx="'+q.x.toFixed(1)+'" cy="'+q.y.toFixed(1)+'" r="'+rad+'" fill="'+col+'" stroke="#fff" stroke-width="2"/>';
    dots+='<text x="'+lx.toFixed(1)+'" y="'+(q.y-9).toFixed(1)+'" font-size="13" font-weight="800" fill="#111" stroke="#fff" stroke-width="3" paint-order="stroke" text-anchor="'+anc+'">'+esc(q.nm)+'</text>';
  });
  let gps='';
  if(typeof gpsLast!=='undefined' && gpsLast && isFinite(gpsLast.lat)){ const gx=_merX(gpsLast.lon,z)-oX, gy=_merY(gpsLast.lat,z)-oY;
    if(gx>=0&&gx<=W&&gy>=0&&gy<=H) gps='<circle cx="'+gx.toFixed(1)+'" cy="'+gy.toFixed(1)+'" r="6" fill="#d23b3b" stroke="#fff" stroke-width="2"/><text x="'+(gx+10).toFixed(1)+'" y="'+(gy+4).toFixed(1)+'" font-size="12" font-weight="800" fill="#d23b3b" stroke="#fff" stroke-width="3" paint-order="stroke">avion</text>'; }
  let totNM=0; for(let i=1;i<pts.length;i++) totNM+=_hav(pts[i-1].la,pts[i-1].lo,pts[i].la,pts[i].lo)/1.852;
  const svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="position:absolute;left:0;top:0;width:'+W+'px;height:'+H+'px;pointer-events:none">'
    +'<polyline points="'+line+'" fill="none" stroke="#ffffff" stroke-width="6" stroke-opacity=".85" stroke-linejoin="round"/>'
    +'<polyline points="'+line+'" fill="none" stroke="#1d4ed8" stroke-width="3" stroke-linejoin="round"/>'
    +dots+gps
    +'<text x="10" y="'+(H-12)+'" font-size="12" font-weight="700" fill="#111" stroke="#fff" stroke-width="3" paint-order="stroke">~'+totNM.toFixed(0)+' NM</text></svg>';
  return '<div class="rmap-wrap"><div class="rmap" style="position:relative;width:'+W+'px;height:'+H+'px;overflow:hidden;border-radius:12px;border:1px solid #d9d2c4;background:#dfe7ee">'
    +tiles+svg
    +'<div style="position:absolute;right:4px;bottom:3px;font-size:9px;color:#222;background:rgba(255,255,255,.8);padding:0 5px;border-radius:5px">&copy; OpenStreetMap</div>'
    +'</div></div>';
}
function fitRouteMap(){ document.querySelectorAll('.rmap-wrap').forEach(w=>{ const m=w.querySelector('.rmap'); if(!m) return; const s=Math.min(1,(w.clientWidth||600)/600); m.style.transformOrigin='top left'; m.style.transform='scale('+s+')'; w.style.height=(380*s)+'px'; }); }
function envelopeSVG(r){
  const ax=P().wb.envelopeAxis,poly=P().wb.envelope,W=320,H=240,pad=38;
  const sx=a=>pad+(a-ax.armMin)/(ax.armMax-ax.armMin)*(W-pad-10);
  const sy=m=>H-pad-(m-ax.massMin)/(ax.massMax-ax.massMin)*(H-pad-12);
  const pts=poly.map(p=>`${sx(p[0]).toFixed(1)},${sy(p[1]).toFixed(1)}`).join(" ");
  let grid="";
  for(let a=2.10;a<=ax.armMax;a+=0.05){ const x=sx(a); grid+=`<line x1="${x}" y1="${pad-6}" x2="${x}" y2="${H-pad}" stroke="#1c2636"/>`; }
  for(let m=ax.massMin;m<=ax.massMax;m+=100){ const y=sy(m); grid+=`<line x1="${pad}" y1="${y}" x2="${W-10}" y2="${y}" stroke="#1c2636"/>`; }
  const towIn=pointInPoly(r.cg,r.mass,poly), zfwIn=r.zfMass>0?pointInPoly(r.zfCG,r.zfMass,poly):true;
  const valid=wbValid();
  const envStroke=valid?'#0e9d63':'#d23b3b', envFill=valid?'rgba(14,157,99,.12)':'rgba(210,59,59,.12)';
  const tow=r.mass>0?`<circle cx="${sx(r.cg)}" cy="${sy(r.mass)}" r="6" fill="${towIn?'#0e9d63':'#ff4d4d'}" stroke="#06210f"/>`:"";
  const zfw=r.zfMass>0?`<circle cx="${sx(r.zfCG)}" cy="${sy(r.zfMass)}" r="5" fill="${zfwIn?'#39b0ff':'#ff4d4d'}" stroke="#04121f"/>`:"";
  const link=(r.mass>0&&r.zfMass>0)?`<line x1="${sx(r.zfCG)}" y1="${sy(r.zfMass)}" x2="${sx(r.cg)}" y2="${sy(r.mass)}" stroke="#5b6675" stroke-width="2" stroke-dasharray="4 3"/>`:"";
  return `<svg viewBox="0 0 ${W} ${H}" width="100%">${grid}
    <polygon points="${pts}" fill="${envFill}" stroke="${envStroke}" stroke-width="2.5"/>
    <line x1="${pad}" y1="${pad-6}" x2="${pad}" y2="${H-pad}" stroke="#3a4658"/>
    <line x1="${pad}" y1="${H-pad}" x2="${W-10}" y2="${H-pad}" stroke="#3a4658"/>
    <text x="${pad}" y="${H-12}" fill="#8a97ab" font-size="10">${ax.armMin}</text>
    <text x="${W-30}" y="${H-12}" fill="#8a97ab" font-size="10">${ax.armMax} m</text>
    <text x="6" y="${pad}" fill="#8a97ab" font-size="10">${ax.massMax}</text>
    <text x="6" y="${H-pad}" fill="#8a97ab" font-size="10">${ax.massMin} kg</text>
    ${link}${zfw}${tow}</svg>`;
}

function chBlockMs(){ const c=state.chrono; return c.offBlock?((c.onBlock||Date.now())-c.offBlock):0; }
function chAirMs(){ const c=state.chrono; return c.takeOff?((c.landing||Date.now())-c.takeOff):0; }
function inFlight(){ const c=state.chrono; return !!(c.takeOff&&!c.landing); }
function chronoRunning(){ const c=state.chrono; return !!(c.offBlock&&!c.onBlock); }
function chronoElapsedMs(){ return chBlockMs(); }
function hhmmUTC(ts){ if(!ts) return '—'; return new Date(ts).toISOString().slice(11,16)+'Z'; }
function applyBlockToCompteur(){ const e=parseFloat(state.compteur.entree); if(isFinite(e)){ const h=chBlockMs()/3600000; state.compteur.sortie=(e+h).toFixed(2); if(typeof updCpt==='function') updCpt(); } }
function chPhaseStamp(field){ const c=state.chrono;
  if(field==='offBlock'){ if(c.offBlock) return; c.offBlock=Date.now(); reqNotif(); reqWake(); }
  else if(field==='takeOff'){ if(!c.offBlock||c.takeOff) return; c.takeOff=Date.now(); }
  else if(field==='landing'){ if(!c.takeOff||c.landing) return; c.landing=Date.now(); }
  else if(field==='onBlock'){ if(!c.landing||c.onBlock) return; c.onBlock=Date.now(); applyBlockToCompteur(); relWake(); }
  saveState(); render(); updateChronoChip();
}
function chronoReset(){ state.chrono={offBlock:null,takeOff:null,landing:null,onBlock:null}; state.fuelMgmt.lastChronoMs=0; saveState(); render(); updateChronoChip(); }
function fmtHMS(ms){ ms=Math.max(0,ms|0); let s=Math.floor(ms/1000),h=Math.floor(s/3600); s-=h*3600; let m=Math.floor(s/60); s-=m*60; const p=n=>String(n).padStart(2,'0'); return (h>0?h+':'+p(m):m)+':'+p(s); }
function updateChronoChip(){ const fl=inFlight(); const ms=fl?chAirMs():chBlockMs(); const el=document.getElementById('chrono'); if(el){ el.textContent=(fl?'\u25B2 ':'\u23F1 ')+fmtHMS(ms); el.classList.toggle('run', chronoRunning()||fl); } const b=document.getElementById('wbBlock'); if(b) b.textContent=fmtHMS(chBlockMs()); const a=document.getElementById('wbAir'); if(a) a.textContent=fmtHMS(chAirMs()); const pb=document.getElementById('phaseBadge'); if(pb){ pb.textContent=fl?'EN VOL':'AU SOL'; pb.className='phase-badge '+(fl?'vol':'sol'); } }

function fuelTick(){
  const m=state.fuelMgmt; if(!m||!m.active) return;
  const cms=chronoElapsedMs(), dms=cms-(m.lastChronoMs||0);
  if(dms<=0) return;
  m.lastChronoMs=cms;
  const burn=dms/3600000*P().fuelMgmtRate;
  if(m.sel==="left") m.left=Math.max(0,(m.left||0)-burn); else m.right=Math.max(0,(m.right||0)-burn);
  const sv=m.sel==="left"?m.left:m.right, ov=m.sel==="left"?m.right:m.left;
  if(!m.prompted && (sv<=ov/2 || sv<=0)){ m.prompted=true; saveState(); showFuelPop(); }

  if(currentTab==="wb") updateFuelMgmtDisplay();

/* ---- GPS ---- */
let gpsActive=false,gpsWatch=null,gpsLast=null,gpsTriggered={},navTriggered={};
function toggleGPS(){
  if(gpsActive){ stopGPS(); return; }
  if(!navigator.geolocation){ alert("Géolocalisation non disponible."); return; }
  navTriggered={};
  gpsWatch=navigator.geolocation.watchPosition(onGPS,onGPSErr,{enableHighAccuracy:true,maximumAge:1000,timeout:15000});
  gpsActive=true; reqNotif(); reqWake(); render();
}
function stopGPS(){ if(gpsWatch!=null) navigator.geolocation.clearWatch(gpsWatch); gpsActive=false; gpsWatch=null; relWake(); if(currentTab==='chk'||currentTab==='nav') render(); }
function onGPSErr(e){ const el=document.getElementById("gpsState"); if(el) el.textContent="erreur"; }
function onGPS(pos){
  const c=pos.coords, gsKt=(c.speed!=null&&isFinite(c.speed))?c.speed*1.94384:null;
  const hdg=(c.heading!=null&&isFinite(c.heading))?c.heading:null;
  gpsLast={lat:c.latitude,lon:c.longitude,alt:c.altitude,gs:gsKt,hdg:hdg,t:Date.now()};
  if(currentTab==='chk'){
    const gsEl=document.getElementById("gpsGS"),posEl=document.getElementById("gpsPos");
    if(gsEl) gsEl.textContent=gsKt!=null?gsKt.toFixed(0)+" kt":"n/d";
    if(posEl) posEl.textContent=c.latitude.toFixed(4)+", "+c.longitude.toFixed(4);
  }
  if(currentTab==='nav') updateNavGps();
  evalTriggers();
}
function distM(a,b,c,d){ const R=6371000,t=x=>x*Math.PI/180,dLat=t(c-a),dLon=t(d-b);
  const x=Math.sin(dLat/2)**2+Math.cos(t(a))*Math.cos(t(c))*Math.sin(dLon/2)**2; return 2*R*Math.asin(Math.sqrt(x)); }
function evalTriggers(){
  if(!gpsLast) return; const p=P(),ad=p.aerodrome,g=p.gps;
  if(gpsLast.gs!=null && gpsLast.gs>g.taxiKt && phaseComplete("avantmer") && !gpsTriggered.roulage){ gpsTriggered.roulage=true; popupChecklist("roulage","Vitesse sol détectée — ROULAGE"); }
  ad.runways.forEach(rw=>{ const d=distM(gpsLast.lat,gpsLast.lon,rw.thrLat,rw.thrLon);
    if(d<g.thresholdRadiusM && !gpsTriggered.avantdec){ gpsTriggered.avantdec=true; popupChecklist("avantdec","Seuil piste "+rw.ident+" — AVANT DÉCOLLAGE"); } });
  if(gpsLast.alt!=null && gpsLast.gs!=null){ const fieldM=ad.elevFt*0.3048;
    if(gpsLast.alt<fieldM+450 && gpsLast.gs<85 && gpsLast.gs>20 && phaseComplete("croisiere") && !gpsTriggered.approche){ gpsTriggered.approche=true; popupChecklist("approche","Descente détectée — APPROCHE"); } }
  (state.navlog||[]).forEach((L,i)=>{ const la=parseFloat(L.lat),lo=parseFloat(L.lon);
    if(isFinite(la)&&isFinite(lo)&&!navTriggered[i]){ const d=distM(gpsLast.lat,gpsLast.lon,la,lo);
      if(d<1500){ navTriggered[i]=true; const nx=state.navlog[i+1];
        navPopup((L.wpt||('Branche '+(i+1)))+' atteint', nx?('Suivant : cap '+(nx.cap||'?')+'° · '+(nx.alt||'?')+' ft'):'Derniere branche'); } } });
}
function phaseComplete(id){ return !!(state.chk[id] && state.chk[id].done); }
const gpspop=document.getElementById("gpspop"); let pendingPhase=null;
function beep(){ try{ const ac=new (window.AudioContext||window.webkitAudioContext)();
  const o=ac.createOscillator(),g=ac.createGain(); o.frequency.value=880; o.connect(g); g.connect(ac.destination);
  g.gain.setValueAtTime(.0001,ac.currentTime); g.gain.exponentialRampToValueAtTime(.25,ac.currentTime+.02);
  g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+.35); o.start(); o.stop(ac.currentTime+.36); }catch(e){} }
function popupChecklist(phaseId,label){ pendingPhase=phaseId; document.getElementById("gpspopTxt").textContent=label;
  gpspop.classList.remove("hide"); beep(); if(navigator.vibrate) navigator.vibrate(120); sysNotify("Checklist",label); }

    navigator.serviceWorker.ready.then(reg=>reg.showNotification(title,{body:body,tag:'envol',renotify:true})).catch(()=>{ try{ new Notification(title,{body:body}); }catch(e){} });
  } else { new Notification(title,{body:body}); }

function airacFolder(d){
  const anchor=Date.UTC(2026,4,14), cyc=28*86400000;
  const t=Date.UTC(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate());
  let n=Math.floor((t-anchor)/cyc), eff=anchor+n*cyc; if(eff>t) eff-=cyc;
  const e=new Date(eff), M=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'][e.getUTCMonth()];
  return 'eAIP_'+String(e.getUTCDate()).padStart(2,'0')+'_'+M+'_'+e.getUTCFullYear();
}
function vacURL(icao){ return 'https://www.sia.aviation-civile.gouv.fr/media/dvd/'+airacFolder(new Date())+'/Atlas-VAC/PDF_AIPparSSection/VAC/AD/AD-2.'+(icao||'').toUpperCase().trim()+'.pdf'; }
function idbOpen(){ return new Promise((res,rej)=>{ const r=indexedDB.open('envol_vac',1); r.onupgradeneeded=()=>{ if(!r.result.objectStoreNames.contains('vac')) r.result.createObjectStore('vac'); }; r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
async function vacSave(icao,blob){ const db=await idbOpen(); return new Promise((res,rej)=>{ const tx=db.transaction('vac','readwrite'); tx.objectStore('vac').put(blob,icao.toUpperCase()); tx.oncomplete=()=>res(1); tx.onerror=()=>rej(tx.error); }); }
async function vacGet(icao){ const db=await idbOpen(); return new Promise((res)=>{ const tx=db.transaction('vac','readonly'); const rq=tx.objectStore('vac').get(icao.toUpperCase()); rq.onsuccess=()=>res(rq.result||null); rq.onerror=()=>res(null); }); }
async function vacDelete(icao){ const db=await idbOpen(); return new Promise((res)=>{ const tx=db.transaction('vac','readwrite'); tx.objectStore('vac').delete(icao.toUpperCase()); tx.oncomplete=()=>res(1); tx.onerror=()=>res(0); }); }
let vacCache={};
function vacShow(icao){
  icao=(icao||'').toUpperCase().trim(); if(icao.length<4){ alert('Code OACI invalide'); return; }
  const url=vacURL(icao);
  if(vacCache[icao]){
    document.getElementById('vacBrowser').href=url;
    document.getElementById('vacTitle').textContent='VAC '+icao;
    document.getElementById('vacview').classList.remove('hide');
    vacGet(icao).then(b=>{ if(b) document.getElementById('vacFrame').src=URL.createObjectURL(b); }).catch(()=>{});
  } else {
    window.open(url,'_blank');
  }
}
async function vacDownload(icao){
  icao=(icao||'').toUpperCase().trim(); const st=document.getElementById('vacStatus');
  if(icao.length<4){ if(st) st.innerHTML='<span class="pill warn">Code OACI invalide</span>'; return; }
  if(st) st.innerHTML='<span class="pill warn">Téléchargement de '+esc(icao)+'\u2026</span>';
  const url=vacURL(icao); let buf=null;
  try{ const r=await fetch(url); if(r.ok) buf=await r.arrayBuffer(); }catch(e){}
  if(!buf){ try{ const r=await fetch('https://api.allorigins.win/raw?url='+encodeURIComponent(url)); if(r.ok) buf=await r.arrayBuffer(); }catch(e){} }
  if(!buf || buf.byteLength<1200){ if(st) st.innerHTML='<span class="pill warn">\u00c9chec \u2014 ouvre dans le navigateur, ou v\u00e9rifie le code/cycle</span>'; return; }
  try{ await vacSave(icao,new Blob([buf],{type:'application/pdf'})); vacCache[icao]=true; if(st) st.innerHTML='<span class="pill ok">VAC '+esc(icao)+' enregistr\u00e9e hors-ligne</span>'; }catch(e){ if(st) st.innerHTML='<span class="pill warn">Erreur de stockage</span>'; }
}

function bearingDeg(a,b){ const r=Math.PI/180, p1=a.la*r, p2=b.la*r, dl=(b.lo-a.lo)*r; const y=Math.sin(dl)*Math.cos(p2); const x=Math.cos(p1)*Math.sin(p2)-Math.sin(p1)*Math.cos(p2)*Math.cos(dl); return (Math.atan2(y,x)*180/Math.PI+360)%360; }
function legFrom(i){ if(i===0){ const d=lookupAirport((state.meteo.dep||'').toUpperCase()); return d?{la:d.la,lo:d.lo}:null; } const pl=state.navlog[i-1]; const la=parseFloat(pl&&pl.lat),lo=parseFloat(pl&&pl.lon); return (isFinite(la)&&isFinite(lo))?{la:la,lo:lo}:null; }
function legTo(i){ const l=state.navlog[i]; const la=parseFloat(l&&l.lat),lo=parseFloat(l&&l.lon); return (isFinite(la)&&isFinite(lo))?{la:la,lo:lo}:null; }
function computeLeg(i){ const f=legFrom(i),t=legTo(i); if(!f||!t) return null; return { cap:Math.round(bearingDeg(f,t)), dist:(_hav(f.la,f.lo,t.la,t.lo)/1.852).toFixed(1) }; }
function autoLegs(){ (state.navlog||[]).forEach((L,i)=>{ const c=computeLeg(i); if(c){ L.cap=String(c.cap); L.dist=String(c.dist); } }); }
function refreshLegCalc(i){ [i,i+1].forEach(k=>{ if(!state.navlog||!state.navlog[k]) return; const c=computeLeg(k); const cc=document.getElementById('leg'+k+'cap'),dd=document.getElementById('leg'+k+'dist'); if(c){ state.navlog[k].cap=String(c.cap); state.navlog[k].dist=String(c.dist); if(cc){ cc.value=c.cap; cc.readOnly=true; } if(dd){ dd.value=c.dist; dd.readOnly=true; } } else { if(cc) cc.readOnly=false; if(dd) dd.readOnly=false; } }); saveState(); }
function legRow(L,i){
  const auto=computeLeg(i);
  const ro='readonly tabindex="-1" style="opacity:.72;background:transparent;border-color:transparent;font-weight:800"';
  const capI=auto?`<input id="leg${i}cap" class="nnum" value="${esc(L.cap)}" ${ro}>`:`<input id="leg${i}cap" class="nnum" inputmode="numeric" value="${esc(L.cap)}">`;
  const distI=auto?`<input id="leg${i}dist" class="nnum" value="${esc(L.dist)}" ${ro}>`:`<input id="leg${i}dist" class="nnum" inputmode="decimal" value="${esc(L.dist)}">`;
  return `<tr>
    <td class="nr">${i+1}</td>
    <td><input id="leg${i}wpt" value="${esc(L.wpt)}" placeholder="Point"></td>
    <td>${capI}</td>
    <td><input id="leg${i}alt" class="nnum" inputmode="numeric" value="${esc(L.alt)}"></td>
    <td>${distI}</td>
    <td><input id="leg${i}time" class="nnum" inputmode="decimal" value="${esc(L.time)}"></td>
    <td><button class="lgx" id="legMore${i}" title="Détails">&#8943;</button></td>
  </tr>
  <tr class="legdet hide" id="legDet${i}"><td></td><td colspan="6">
    <div class="grid">
      <label>Lat<input id="leg${i}lat" inputmode="decimal" value="${esc(L.lat)}" placeholder="49.16"></label>
      <label>Lon<input id="leg${i}lon" inputmode="decimal" value="${esc(L.lon)}" placeholder="2.31"></label>
      <label class="span2">Observations<input id="leg${i}obs" value="${esc(L.obs)}" placeholder="fréquence, points, remarques"></label>
    </div>
    <button class="btn danger" id="legDel${i}" style="margin-top:8px;min-height:40px">Supprimer la branche ${i+1}</button>
  </td></tr>`;
}
function bindLeg(i,f){ const el=document.getElementById('leg'+i+f); if(!el) return; el.addEventListener('input',()=>{ state.navlog[i][f]=el.value; if(f==='wpt'){ const m=el.value.toUpperCase().match(/\b(LF[A-Z]{2}|[A-Z]{4})\b/); if(m){ const a=lookupAirport(m[1]); if(a){ state.navlog[i].lat=a.la; state.navlog[i].lon=a.lo; const la=document.getElementById('leg'+i+'lat'),lo=document.getElementById('leg'+i+'lon'); if(la) la.value=a.la; if(lo) lo.value=a.lo; } } } if(f==='wpt'||f==='lat'||f==='lon') refreshLegCalc(i); saveState(); }); }
function updateNavGps(){
  if(currentTab!=='nav') return;
  const g=document.getElementById('navGps'); if(g) g.textContent=gpsActive?'actif':'inactif';
  const pos=document.getElementById('navPos'), gs=document.getElementById('navGs');
  if(gpsLast){ if(pos) pos.textContent=gpsLast.lat.toFixed(4)+', '+gpsLast.lon.toFixed(4);
    if(gs) gs.textContent=(gpsLast.gs!=null?gpsLast.gs.toFixed(0)+' kt':'n/d')+(gpsLast.hdg!=null?' / '+gpsLast.hdg.toFixed(0)+'\u00b0':''); }
  else { if(pos) pos.textContent='\u2014'; if(gs) gs.textContent='\u2014'; }
}

function renderCard(){
  const p=P(),r=computeWB(),valid=wbValid();
  const chkDone=p.checklists.every(ph=>phaseComplete(ph.id));
  main.innerHTML=`
  <div class="eyebrow">Carnet de vol</div>
  <div class="card">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <img src="${ALTEON_LOGO}" alt="ALTEON FLY" style="width:46px;height:46px;border-radius:10px;flex:0 0 auto">
      <div><div style="font-weight:800;font-size:18px;letter-spacing:.5px">ALTEON <span style="color:var(--accent)">FLY</span></div><div class="note">Datacard de vol — ${p.immat}</div></div>
    </div>
    <label class="fld">Commandant de bord (PIC)<input id="picName" value="${esc(state.pic)}" placeholder="Nom du PIC" style="text-transform:none"></label>
    <div class="kv" style="margin-top:8px"><span class="k">Masse / CG décollage</span><span class="v">${fmt(r.mass)} kg @ ${r.cg.toFixed(3)} m</span></div>
    <div class="kv"><span class="k">Centrage</span><span class="v">${valid?'<span class="pill ok">VALIDE</span>':'<span class="pill bad">HORS ENVELOPPE</span>'}</span></div>
    <div class="kv"><span class="k">Checklists normales</span><span class="v">${chkDone?'<span class="pill ok">COMPLÉTÉES</span>':'<span class="pill warn">PARTIELLES</span>'}</span></div></div>
  <div class="card"><h2>Enveloppe de centrage</h2><div style="text-align:center">${envelopeSVG(r)}</div></div>
  <div class="card"><h2>Trajet prévu</h2><div style="text-align:center">${routeMap()}</div>
    <div class="note" style="margin-top:8px">Route directe (pointillés) ou selon les points du plan de vol dont les coordonnées sont saisies.</div></div>
  <div class="card"><h2>Signature du PIC</h2>
    <canvas id="sigpad"></canvas>
    <div class="row" style="margin-top:10px">

    <div id="sigStatus" class="note" style="margin-top:6px">${state.sig?'<span class="pill ok">Signature enregistrée</span>':'Non signée'}</div></div>
  <div class="card"><h2>Export</h2>
    <button class="btn accent" id="btnPdf">Générer la fiche de vol (PDF / impression)</button>
    <div class="note" style="margin-top:8px">Sur iPad : <b>Imprimer → Enregistrer en PDF</b>.</div></div>`;
  bindInput("picName",v=>state.pic=v,true);

  document.getElementById("btnPdf").onclick=exportPDF;
  fitRouteMap();
}
let sigCanvas,sigCtx,sigDrawing=false;
function setupSigPad(){
  sigCanvas=document.getElementById("sigpad"); const ratio=window.devicePixelRatio||1;
  const rect=sigCanvas.getBoundingClientRect(); sigCanvas.width=rect.width*ratio; sigCanvas.height=rect.height*ratio;
  sigCtx=sigCanvas.getContext("2d"); sigCtx.scale(ratio,ratio); sigCtx.lineWidth=2.4; sigCtx.lineCap="round"; sigCtx.strokeStyle="#111";
  if(state.sig){ const img=new Image(); img.onload=()=>sigCtx.drawImage(img,0,0,rect.width,rect.height); img.src=state.sig; }
  const pos=e=>{const rc=sigCanvas.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-rc.left,y:t.clientY-rc.top};};
  const start=e=>{e.preventDefault();sigDrawing=true;const pt=pos(e);sigCtx.beginPath();sigCtx.moveTo(pt.x,pt.y);};
  const move=e=>{if(!sigDrawing)return;e.preventDefault();const pt=pos(e);sigCtx.lineTo(pt.x,pt.y);sigCtx.stroke();};
  const end=()=>{sigDrawing=false;};
  sigCanvas.onpointerdown=start; sigCanvas.onpointermove=move; sigCanvas.onpointerup=end; sigCanvas.onpointerleave=end;
}
function clearSig(){ const rect=sigCanvas.getBoundingClientRect(); sigCtx.clearRect(0,0,rect.width,rect.height); state.sig=null; saveState(); document.getElementById("sigStatus").textContent="Non signée"; }
function exportPDF(){
  const p=P(),r=computeWB(),perf=wbValid()?computePerf():null,valid=wbValid();
  const utc=new Date().toISOString().replace("T"," ").slice(0,16)+" UTC";
  const chkDone=p.checklists.every(ph=>phaseComplete(ph.id));
  const rows=r.items.map(it=>`<tr><td>${esc(it.label)}</td><td style="text-align:right">${fmt(it.mass)}</td><td style="text-align:right">${it.arm.toFixed(3)}</td><td style="text-align:right">${fmt(it.mass*it.arm)}</td></tr>`).join("");
  const ce=parseFloat(state.compteur.entree), cs=parseFloat(state.compteur.sortie);
  const cdelta=(isFinite(ce)&&isFinite(cs)&&cs>=ce)?(cs-ce).toFixed(2)+' h':'\u2014';
  const navRows=(state.navlog||[]).map((L,i)=>`<tr><td>${i+1}</td><td>${esc(L.wpt||'')}</td><td>${esc(L.cap||'')}</td><td>${esc(L.alt||'')}</td><td>${esc(L.dist||'')}</td><td>${esc(L.time||'')}</td><td>${esc(L.obs||'')}</td></tr>`).join("");
  let h='<div class="head"><div><h1>FICHE DE VOL \u2014 '+esc(p.immat)+'</h1><div>'+esc(p.type)+'</div></div><div style="text-align:right;display:flex;align-items:center;gap:10px"><img src="'+ALTEON_LOGO+'" style="width:46px;height:46px;border-radius:8px"><div><b>ALTEON FLY</b><br>'+utc+'</div></div></div>';
  h+='<h3>Masse &amp; centrage</h3><table><tr><th>Poste</th><th style="text-align:right">Masse (kg)</th><th style="text-align:right">Bras (m)</th><th style="text-align:right">Moment</th></tr>'+rows
    +'<tr style="font-weight:bold"><td>TOTAL D\u00c9COLLAGE</td><td style="text-align:right">'+fmt(r.mass)+'</td><td style="text-align:right">'+r.cg.toFixed(3)+'</td><td style="text-align:right">'+fmt(r.moment)+'</td></tr></table>';
  h+='<div class="box">Centrage : <b class="'+(valid?'ok':'bad')+'">'+(valid?"DANS L'ENVELOPPE":'HORS ENVELOPPE')+'</b> | MTOW '+r.maxWeight+' kg | ZFW '+fmt(r.zfMass)+' kg @ '+r.zfCG.toFixed(3)+' m | Carburant '+fmt(r.fuelL)+' L</div>';
  h+='<h3>Enveloppe de centrage</h3><div class="box" style="text-align:center"><div style="max-width:300px;margin:0 auto">'+envelopeSVG(r)+'</div></div>';
  if(perf){ h+='<h3>Performances</h3><table>'
    +'<tr><th>Décollage</th><td>'+esc(perf.to.icao||'?')+' QFU '+esc(perf.to.qfu||'?')+' ('+(perf.to.hdg!=null?perf.to.hdg+'°':'—')+') — '+esc(perf.to.surface)+'</td><th>Atterrissage</th><td>'+esc(perf.ldg.icao||'?')+' QFU '+esc(perf.ldg.qfu||'?')+' ('+(perf.ldg.hdg!=null?perf.ldg.hdg+'°':'—')+') — '+esc(perf.ldg.surface)+'</td></tr>'
    +'<tr><th>Vent / alt. densité</th><td>'+(perf.to.wc.head>=0?'face':'arrière')+' '+Math.abs(perf.to.wc.head).toFixed(0)+' kt · '+perf.to.da+' ft</td><th>Vent / alt. densité</th><td>'+(perf.ldg.wc.head>=0?'face':'arrière')+' '+Math.abs(perf.ldg.wc.head).toFixed(0)+' kt · '+perf.ldg.da+' ft</td></tr>'
    +'<tr><th>Décollage 50 ft</th><td><b>'+perf.to.dist+' m</b> '+(perf.to.avail>0?'/ TODA '+perf.to.avail:'')+'</td><th>Atterrissage 50 ft</th><td><b>'+perf.ldg.dist+' m</b> '+(perf.ldg.avail>0?'/ LDA '+perf.ldg.avail:'')+'</td></tr>'
    +'<tr><th>OAT / QNH</th><td>'+perf.oat+' °C / '+perf.qnh+' hPa</td><th>Vr/Vx/Vy · Vapp</th><td>'+perf.speeds.vr+'/'+perf.speeds.vx+'/'+perf.speeds.vy+' · '+perf.speeds.vApproachFlaps40+' kt</td></tr></table>'; }
  h+='<h3>Conditions / route</h3><div class="box mono">Route : '+esc(state.meteo.dep||'\u2014')+' \u2192 '+esc(state.meteo.arr||'\u2014')
    +'\nVent '+esc(state.meteo.windDir)+'\u00b0 / '+esc(state.meteo.windSpd)+' kt \u2014 '+esc(state.meteo.temp)+' \u00b0C \u2014 QNH '+esc(state.meteo.qnh)+' hPa</div>';
  h+='<h3>Trajet prévu</h3><div class="box" style="text-align:center">'+routeMap()+'</div>';
  if(navRows) h+='<h3>Plan de vol</h3><table><tr><th>#</th><th>Point</th><th>Cap</th><th>Alt</th><th>Dist</th><th>Temps</th><th>Obs.</th></tr>'+navRows+'</table>';
  h+='<h3>Compteur &amp; temps</h3><div class="box">Compteur entr\u00e9e : <b>'+esc(state.compteur.entree||'\u2014')+'</b> \u00b7 sortie : <b>'+esc(state.compteur.sortie||'\u2014')+'</b> \u00b7 temps compteur : <b>'+cdelta+'</b><br>Temps bloc : <b>'+fmtHMS(chBlockMs())+'</b> · Temps de vol : <b>'+fmtHMS(chAirMs())+'</b></div>';
  h+='<div class="box">Checklists normales compl\u00e9t\u00e9es : <b class="'+(chkDone?'ok':'bad')+'">'+(chkDone?'OUI':'NON')+'</b></div>';
  h+='<h3>Signature du commandant de bord</h3>'+(state.sig?'<img src="'+state.sig+'" class="sig" style="object-fit:contain">':'<div class="sig"></div>')
    +'<p>Sign\u00e9 \u00e9lectroniquement par le PIC <b>'+esc(state.pic||'(non renseign\u00e9)')+'</b> le <b>'+utc+'</b>.</p>';
  document.getElementById('pdfdoc').innerHTML=h;
  document.getElementById('pdfview').classList.remove('hide');
  setTimeout(fitRouteMap,30);
}

function updCpt(){ const e=parseFloat(state.compteur.entree),s=parseFloat(state.compteur.sortie); const el=document.getElementById('cptDelta'); if(el) el.textContent=(isFinite(e)&&isFinite(s)&&s>=e)?((s-e).toFixed(2)+' h'):'—'; }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function fmt(n){ if(n==null||!isFinite(n)) return "0"; return (Math.round(n*10)/10).toLocaleString("fr-FR"); }
function bindInput(id,fn,live,after){
  const el=document.getElementById(id); if(!el) return;
  el.addEventListener("input",()=>{ fn(el.value); saveState(); if(live){ lockPerfTab(!wbValid()); if(after) after(); } });
}

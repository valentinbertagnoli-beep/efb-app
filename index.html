<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0e14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EnVol EFB">
<title>EnVol EFB — F-GRLA</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='38' fill='%230a0e14'/%3E%3Cpath d='M90 28 L150 132 L90 110 L30 132 Z' fill='%233ddc97'/%3E%3Ccircle cx='90' cy='150' r='9' fill='%233ddc97'/%3E%3C/svg%3E">
<style>
  :root{
    --bg:#0a0e14; --panel:#121823; --panel2:#1a2230; --line:#2a3548;
    --ink:#e8eef7; --muted:#8a97ab; --accent:#3ddc97; --accent2:#39b0ff;
    --warn:#ffb020; --danger:#ff4d4d; --ok:#2fd07a;
    --tap:64px;
    --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
    --safe-l:env(safe-area-inset-left,0px); --safe-r:env(safe-area-inset-right,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Arial,sans-serif;
    font-size:17px; line-height:1.35; overflow:hidden;
    -webkit-text-size-adjust:100%; user-select:none;
  }
  .hide{display:none!important;}
  /* ===== Layout ===== */
  #app{display:flex;flex-direction:column;height:100%;}
  header{
    background:linear-gradient(180deg,#0d131d,#0a0e14);
    border-bottom:1px solid var(--line);
    padding:calc(var(--safe-t) + 6px) calc(10px + var(--safe-r)) 6px calc(10px + var(--safe-l));
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  }
  .logo{display:flex;align-items:center;gap:9px;font-weight:800;letter-spacing:.5px;}
  .logo svg{width:30px;height:30px;}
  .logo b{color:var(--accent);}
  .acft-sel{margin-left:auto;display:flex;align-items:center;gap:8px;}
  select,input,button,textarea{font-family:inherit;font-size:16px;color:var(--ink);}
  select{
    background:var(--panel2);border:1px solid var(--line);border-radius:12px;
    padding:10px 12px;min-height:48px;font-weight:700;
  }
  .badge{font-size:12px;font-weight:800;letter-spacing:.6px;padding:5px 9px;border-radius:8px;
    background:#3a1414;color:var(--danger);border:1px solid #5e1d1d;white-space:nowrap;}
  /* certification banner */
  #certbar{background:#2a1606;color:var(--warn);border-bottom:1px solid #5e3a12;
    font-size:12.5px;font-weight:700;text-align:center;padding:5px 8px;letter-spacing:.3px;}
  main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding:14px calc(14px + var(--safe-r)) 20px calc(14px + var(--safe-l));}
  /* ===== Tab bar ===== */
  nav{
    display:flex;background:#0d131d;border-top:1px solid var(--line);
    padding-bottom:var(--safe-b);
  }
  nav button{
    flex:1;background:none;border:none;color:var(--muted);
    padding:9px 2px;min-height:var(--tap);display:flex;flex-direction:column;
    align-items:center;gap:3px;font-size:11.5px;font-weight:700;cursor:pointer;
    border-top:3px solid transparent;transition:.12s;
  }
  nav button .ic{font-size:21px;line-height:1;}
  nav button.on{color:var(--accent);border-top-color:var(--accent);background:#0f1722;}
  nav button:active{background:#11203a;}
  /* ===== Cards ===== */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;
    padding:16px;margin-bottom:14px;}
  .card h2{margin:0 0 12px;font-size:15px;letter-spacing:.8px;color:var(--muted);
    text-transform:uppercase;font-weight:800;}
  .card h3{margin:14px 0 8px;font-size:14px;color:var(--accent2);letter-spacing:.4px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .row>*{flex:1;min-width:120px;}
  label.fld{display:flex;flex-direction:column;gap:6px;font-size:13px;color:var(--muted);font-weight:700;}
  .fld input,.fld select{
    background:var(--panel2);border:1px solid var(--line);border-radius:12px;
    padding:13px 12px;min-height:52px;font-size:18px;font-weight:700;width:100%;
  }
  .fld input:focus{outline:2px solid var(--accent2);border-color:var(--accent2);}
  .btn{
    background:var(--panel2);border:1px solid var(--line);border-radius:14px;
    padding:14px 16px;min-height:56px;font-weight:800;cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;gap:8px;color:var(--ink);
    transition:.12s;width:100%;
  }
  .btn:active{transform:scale(.98);}
  .btn.primary{background:linear-gradient(180deg,#1c7a55,#15603f);border-color:#1f8a5f;color:#eafff4;}
  .btn.accent{background:linear-gradient(180deg,#1d6fb0,#155a8f);border-color:#2079b8;color:#eaf6ff;}
  .btn.ghost{background:transparent;}
  .btn.danger{background:#3a1414;border-color:#5e1d1d;color:#ff8c8c;}
  .kv{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);}
  .kv:last-child{border-bottom:none;}
  .kv .k{color:var(--muted);font-weight:700;}
  .kv .v{font-weight:800;font-variant-numeric:tabular-nums;}
  .big{font-size:30px;font-weight:900;font-variant-numeric:tabular-nums;}
  .muted{color:var(--muted);}
  .pill{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:800;}
  .pill.ok{background:#0f2e20;color:var(--ok);border:1px solid #1c5a3c;}
  .pill.bad{background:#3a1414;color:var(--danger);border:1px solid #5e1d1d;}
  .pill.warn{background:#2a1c06;color:var(--warn);border:1px solid #5e451a;}
  .note{font-size:12.5px;color:var(--muted);line-height:1.5;}
  .src{font-size:11.5px;color:#6f7d92;font-style:italic;margin-top:4px;}
  hr{border:none;border-top:1px solid var(--line);margin:14px 0;}
  /* ===== W&B SVG ===== */
  .planewrap{display:flex;justify-content:center;}
  svg .seat{cursor:pointer;}
  svg text{user-select:none;}
  /* ===== Envelope ===== */
  .flash{animation:flash .7s infinite;}
  @keyframes flash{0%,100%{opacity:1}50%{opacity:.35}}
  /* ===== Checklist ===== */
  .chk-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:8px;-webkit-overflow-scrolling:touch;}
  .chk-tabs button{white-space:nowrap;background:var(--panel2);border:1px solid var(--line);
    border-radius:12px;padding:11px 14px;min-height:50px;font-weight:800;font-size:14px;color:var(--muted);flex:0 0 auto;}
  .chk-tabs button.on{color:#06210f;background:var(--accent);border-color:var(--accent);}
  .chk-tabs button.urg.on{background:var(--danger);border-color:var(--danger);color:#fff;}
  .progress{height:14px;background:var(--panel2);border-radius:999px;overflow:hidden;border:1px solid var(--line);margin:6px 0 14px;}
  .progress>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;transition:.25s;}
  .chk-item{display:flex;align-items:center;gap:14px;padding:14px 12px;border:1px solid var(--line);
    border-radius:14px;margin-bottom:10px;background:var(--panel2);cursor:pointer;min-height:var(--tap);transition:.12s;}
  .chk-item:active{transform:scale(.995);}
  .chk-item .box{width:34px;height:34px;border-radius:9px;border:2px solid var(--muted);flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;font-size:22px;color:transparent;}
  .chk-item.done{opacity:.5;background:#0f2417;border-color:#1c5a3c;}
  .chk-item.done .box{background:var(--ok);border-color:var(--ok);color:#06210f;}
  .chk-item .txt{flex:1;}
  .chk-item .txt b{display:block;font-size:15.5px;}
  .chk-item .txt span{font-size:13.5px;color:var(--accent2);font-weight:700;}
  .chk-item.done .txt b{text-decoration:line-through;}
  .chk-item.mem{border-style:dashed;}
  .chk-info{background:#10202f;border:1px solid #1d3b52;border-radius:12px;padding:10px 12px;margin-bottom:10px;font-size:13.5px;color:#bfe0ff;}
  /* ===== Keypad modal ===== */
  .modal{position:fixed;inset:0;background:rgba(3,6,11,.72);backdrop-filter:blur(3px);
    display:flex;align-items:center;justify-content:center;z-index:50;padding:16px;}
  .modal .box{background:var(--panel);border:1px solid var(--line);border-radius:22px;
    padding:18px;width:min(420px,100%);}
  .modal h3{margin:0 0 4px;font-size:18px;}
  .disp{font-size:40px;font-weight:900;text-align:right;background:var(--panel2);border:1px solid var(--line);
    border-radius:14px;padding:14px 18px;margin:12px 0;font-variant-numeric:tabular-nums;min-height:70px;}
  .keys{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .keys button{min-height:62px;font-size:24px;font-weight:800;background:var(--panel2);border:1px solid var(--line);border-radius:14px;}
  .keys button:active{background:#22324a;}
  .modal .actions{display:flex;gap:10px;margin-top:12px;}
  /* ===== GPS popup ===== */
  #gpspop{position:fixed;left:12px;right:12px;bottom:calc(var(--safe-b) + 86px);z-index:60;
    background:linear-gradient(180deg,#11314a,#0e2336);border:1px solid var(--accent2);
    border-radius:18px;padding:14px 16px;box-shadow:0 12px 40px rgba(0,0,0,.6);display:flex;gap:12px;align-items:center;}
  #gpspop .t{flex:1;}
  #gpspop .t b{display:block;color:var(--accent);font-size:13px;letter-spacing:.5px;}
  #gpspop .t span{font-size:15px;font-weight:700;}
  /* ===== Signature ===== */
  #sigpad{width:100%;height:200px;background:#fff;border-radius:14px;touch-action:none;display:block;}
  /* ===== misc ===== */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  @media (max-width:520px){.grid2{grid-template-columns:1fr;}}
  .tag{font-size:11px;font-weight:800;letter-spacing:.4px;color:var(--warn);background:#241803;border:1px solid #4a3410;padding:3px 7px;border-radius:7px;}
  .seatbtn{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:12px;min-height:84px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;font-weight:800;}
  .seatbtn .lbl{font-size:12px;color:var(--muted);}
  .seatbtn .val{font-size:22px;font-variant-numeric:tabular-nums;}
  .seatbtn.set{border-color:var(--accent);background:#0f2417;}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">
      <svg viewBox="0 0 100 100" aria-hidden="true"><path d="M50 12 L86 78 L50 64 L14 78 Z" fill="#3ddc97"/><circle cx="50" cy="88" r="6" fill="#3ddc97"/></svg>
      <div>EnVol <b>EFB</b></div>
    </div>
    <div class="acft-sel">
      <span class="badge" id="immatBadge">F-GRLA</span>
      <select id="acftSelect" aria-label="Choix avion"></select>
    </div>
  </header>
  <div id="certbar">⚠️ APPLICATION NON CERTIFIÉE — AIDE À LA DÉCISION UNIQUEMENT — LE CDB RESTE RESPONSABLE DU RECOUPEMENT AVEC L'AFM / LA FICHE DE PESÉE</div>

  <main id="main"></main>

  <nav id="nav">
    <button data-tab="profil" class="on"><span class="ic">🛰️</span>Profil &amp; Météo</button>
    <button data-tab="wb"><span class="ic">⚖️</span>Masse &amp; Centrage</button>
    <button data-tab="perf"><span class="ic">📈</span>Performances</button>
    <button data-tab="chk"><span class="ic">✓</span>Checklists</button>
    <button data-tab="card"><span class="ic">📝</span>Datacard</button>
  </nav>
</div>

<div id="gpspop" class="hide">
  <div style="font-size:26px">🔔</div>
  <div class="t"><b>CHECKLIST AUTOMATIQUE</b><span id="gpspopTxt">—</span></div>
  <button class="btn accent" style="width:auto;padding:12px 16px;min-height:48px" id="gpspopOpen">Ouvrir</button>
  <button class="btn ghost" style="width:auto;padding:12px 14px;min-height:48px" id="gpspopHide">Masquer</button>
</div>

<div id="keypad" class="modal hide">
  <div class="box">
    <h3 id="kpTitle">Masse</h3>
    <div class="note" id="kpUnit">kilogrammes (kg)</div>
    <div class="disp" id="kpDisp">0</div>
    <div class="keys">
      <button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button>
      <button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button>
      <button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button>
      <button data-k=".">.</button><button data-k="0">0</button><button data-k="del">⌫</button>
    </div>
    <div class="actions">
      <button class="btn ghost" id="kpClear">Effacer</button>
      <button class="btn danger" id="kpCancel">Annuler</button>
      <button class="btn primary" id="kpOk">Valider</button>
    </div>
  </div>
</div>

<script>
/* =====================================================================
   EnVol EFB — Piper PA-28-161 Warrior III — F-GRLA
   Application MONO-FICHIER, hors-ligne (hors METAR).
   Toutes les données avion sont isolées dans AIRCRAFT_PROFILES.
   ===================================================================== */

/* --------------------------------------------------------------------
   PROFILS AVION (modulaire / scalable)
   Sources :
   - Centrage, bras, carburant, vitesses, checklists : CL F-GRLA (ACPN, Warrior III)
   - Modèle de performance : AFM PIPER CADET PA-28-161 (VB-1375)  <-- variante ≠ Warrior III
   Valeurs marquées TODO = à confirmer (fiche de pesée / coordonnées terrain).
   -------------------------------------------------------------------- */
const AIRCRAFT_PROFILES = {
  "F-GRLA": {
    label: "Piper PA-28-161 Warrior III — F-GRLA",
    type: "PA-28-161 Warrior III",
    immat: "F-GRLA",
    fuelDensity: 0.72,          // kg/L (Avgas 100LL) — checklist p.5 (136 kg / 189 L)
    wb: {
      // ⚠️ À confirmer sur la fiche de pesée réelle de F-GRLA (modifiable dans l'app)
      emptyMass: 720,           // kg   (checklist p.5)
      emptyArm: 2.213,          // m
      maxWeight: 1107,          // kg MTOW (checklist p.5)
      fuel: { fullL:189, fullKg:136, unusableL:7, arm:2.413 },
      stations: [
        { id:"front", label:"Sièges avant (équipage)", arm:2.045, max:null },
        { id:"rear",  label:"Passagers arrière",       arm:3.000, max:null },
        { id:"bag",   label:"Bagages / soute",         arm:3.627, max:90  }
      ],
      // Enveloppe catégorie normale — relevée du graphe checklist p.5 (calibrée au pixel)
      // [bras (m), masse (kg)] — polygone fermé
      envelope: [
        [2.115,720],[2.115,885],[2.25,1107],[2.345,1107],[2.345,720]
      ],
      envelopeAxis: { armMin:2.07, armMax:2.40, massMin:650, massMax:1150 }
    },
    speeds: {
      // checklist : MONTÉE / AVANT DECOLLAGE / APPROCHE
      vr:55, vx:63, vy:79, climbNormal:90,
      vEvolFlaps0:80, vEvolFlaps10:75,
      vApproachFlaps40:63,    // + correction vent
      vso:44                  // déduit : 1.2*Vso = 53 kt (CL atterrissage précaution)
    },
    perf: {
      // ---- Modèle NON CERTIFIÉ basé sur l'AFM CADET PA-28-161 (VB-1375) ----
      // L'AFM fourni est celui du Cadet (MTOW 1055 kg), PAS du Warrior III (1107 kg).
      sourceVariant: "AFM PIPER CADET PA-28-161 (VB-1375) — variante ≠ Warrior III",
      // Points de référence lus sur les abaques (exemples imprimés sur les figures) :
      // Décollage 50 ft, volets 0° (Fig.5-9) : 1055 kg, 500 ft, 38°C, 15 kt face -> 640 m
      // Atterrissage 50 ft, volets 40° (Fig.5-35) : 1055 kg, 2500 ft, 24°C, vent nul -> 363 m
      takeoff:   { base50ft_m: 540, refMass:1055, refAltFt:0, refTempC:15, vlof:50, v50:55 },
      landing:   { base50ft_m: 380, refMass:1055, refAltFt:0, refTempC:15, vapp:63 },
      // Sensibilités 1er ordre (approx., modifiables) :
      kPer1000ft: 0.10,   // +10 % de distance / +1000 ft d'altitude-densité
      kPerKgOverRef: 0.0009, // ~ +0.09 %/kg au-dessus de la masse de référence
      kHeadwindPerKt: 0.013, // -1.3 %/kt de vent de face
      kTailwindPerKt: 0.05,  // +5 %/kt de vent arrière
      // Correction de masse Cadet -> Warrior (les abaques sont calées 1055 kg) :
      // appliquée automatiquement via kPerKgOverRef quand masse réelle > refMass.
      surfaceFactors: { // multiplicateurs de distance
        "Sèche/Dur":1.00, "Mouillée/Dur":1.15, "Herbe sèche":1.20, "Herbe mouillée":1.38
      },
      safetyMargin: 1.25  // marge appliquée sur les distances calculées
    },
    aerodrome: {
      // ⚠️ Coordonnées et seuils À VÉRIFIER (placeholder : Persan-Beaumont LFPT)
      icao:"LFPT", name:"Persan-Beaumont", lat:49.1656, lon:2.3447, elevFt:148,
      runways:[
        { ident:"01", hdg:6,  thrLat:49.1620, thrLon:2.3430 },
        { ident:"19", hdg:186,thrLat:49.1700, thrLon:2.3465 }
      ]
    },
    gps: { taxiKt:2, thresholdRadiusM:50 },
    checklists: normalChecklists(),
    emergencies: emergencyChecklists()
  }
};

/* ---- Données checklists (transcription fidèle CL F-GRLA / ACPN) ---- */
function normalChecklists(){
  const P = (id,title,items,info)=>({id,title,info:info||"",items:items.map(x=>({item:x[0],action:x[1]}))});
  return [
    P("prevol","Guide prévol",[
      ["Pastille CO","Vérifiée"],["Sac vomitoire","Vérifier présence"],
      ["Tous éclairages extérieurs (1er vol)","Vérifiés"],["Volets","40"],
      ["Avertisseur de décrochage","Vérifié"],["3 purges carburant (1er vol / nuit)","Effectuées"],
      ["Fuselage AR droit — marchepied","Vérifié"],["Porte de soute","Verrouillée et fermée à clé"],
      ["Porte prise de parc","Fermée"],["Antennes","État et fixations vérifiés"],
      ["Empennages — surface / débattements / charnières","Vérifiés"],
      ["Fuselage AR gauche — entrée d'air","Vérifiée"],
      ["Aile gauche — volet / aileron","Vérifiés"],["Saumon et bloc éclairage","Vérifiés"],
      ["Prise anémométrique","Vérifiée"],["Mise à l'air libre réservoir G","Vérifiée"],
      ["Sonde de décrochage","Vérifiée"],["Réservoir G","Vérifié"],
      ["Train gauche — pneu / frein / amortisseur","Vérifiés"],
      ["Fuselage AV gauche — capotage / phare","Vérifiés"],["Entrée d'air","Dégagée"],
      ["Hélice / cône","Vérifiés"],["Courroie alternateur","Vérifiée"],
      ["Train avant — amortisseur / pneu","Vérifiés"],
      ["Fuselage AV droit — capotage","Vérifié"],["Niveau d'huile","Vérifié"],["Pare-brise","Vérifié"],
      ["Train droit — pneu / frein / amortisseur","Vérifiés"],
      ["Aile droite — prise aération / réservoir","Vérifiés"],["Saumon et bloc éclairage","Vérifiés"],
      ["Mise à l'air libre réservoir D","Vérifiée"],["Aileron / volet droit","Vérifiés"]
    ],"Lire au sol, avion immobilisé. Items grisés (AFM) à restituer de mémoire."),

    P("avantmer","Avant mise en route",[
      ["Barre de tractage","Enlevée"],["Cache Pitot","Enlevé"],["Prévol","Effectuée"],
      ["Documents","À bord"],["Horamètre","Relevé"],["Porte","Fermée non verrouillée"],
      ["Sièges","Réglés"],["Ceintures / harnais","Attachés"],
      ["Sélecteur carburant","Sur le moins plein"],["Sélecteur statique","Normal"],
      ["Magnétos","Off / Clé engagée"],["Potentiomètres d'éclairage","Off"],
      ["Interrupteurs","Off sauf feu anti-collision"],["Avionic Master","Off"],
      ["Réchauffage carburateur","Froid"],["Panneaux disjoncteurs","Vérifiés"],
      ["Chauffage / Désembuage","Fermés"],["Balise de détresse","Arm"],["Volets","Zéro"],
      ["Batterie","On"],["Tableau d'alarme","Test"],["PFD","Initialisation vérifiée"],
      ["MFD — carburant embarqué","Affiché en L puis lu en USG"],["Touche « Fuel done »","Appuyée"],
      ["Cohérence Fuel Rmng / Fuel quantity","Vérifiée"],["Autonomie","Annoncée"],
      ["Frein de parking","Serré"]
    ]),

    P("demarrage","Démarrage",[
      ["— DÉMARRAGE À FROID —",""],
      ["Mixture","Riche"],["Pompe carburant","On"],
      ["Primer / débattements / gaz","À la demande puis 1 cm"],["Champ d'hélice","Dégagé"],
      ["Démarreur","Engagé"],["Gaz","1000 RPM"],
      ["— DÉMARRAGE À CHAUD —",""],
      ["Mixture","Riche"],["Pompe carburant","On"],["Injections","2 débattements gaz"],
      ["Gaz","1 cm"],["Champ d'hélice","Dégagé"],["Démarreur","Engagé"],["Gaz","1000 RPM"]
    ]),

    P("apresmer","Après mise en route",[

/* ====================================================================
   CALCULS W&B
   ==================================================================== */
function wbInputs(){
  const w=state.wb, p=P().wb;
  return {
    emptyMass: num(w.emptyMass, p.emptyMass),
    emptyArm:  num(w.emptyArm,  p.emptyArm),
    front: num(w.front,0), rear:num(w.rear,0), bag:num(w.bag,0),
    fuelL: num(w.fuelL,0)
  };
}
function num(v,d){ const n=parseFloat(v); return isFinite(n)?n:(d!==undefined?d:0); }

function computeWB(){
  const p=P().wb, i=wbInputs();
  const fuelKg = i.fuelL * P().fuelDensity;
  const items=[
    {label:"Masse à vide", mass:i.emptyMass, arm:i.emptyArm},
    {label:"Équipage (AV)", mass:i.front, arm:p.stations[0].arm},
    {label:"Passagers AR", mass:i.rear, arm:p.stations[1].arm},
    {label:"Bagages", mass:i.bag, arm:p.stations[2].arm},
    {label:"Carburant", mass:fuelKg, arm:p.fuel.arm}
  ];
  let mass=0,moment=0;
  items.forEach(it=>{ mass+=it.mass; moment+=it.mass*it.arm; });
  const cg = mass>0? moment/mass : 0;
  // Zéro fuel
  const zfMass = mass - fuelKg;
  const zfMoment = moment - fuelKg*p.fuel.arm;
  const zfCG = zfMass>0? zfMoment/zfMass : 0;
  return { items, fuelKg, mass, moment, cg, zfMass, zfCG, maxWeight:p.maxWeight };
}

function pointInPoly(arm,mass,poly){
  let inside=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const xi=poly[i][0], yi=poly[i][1], xj=poly[j][0], yj=poly[j][1];
    const inter=((yi>mass)!==(yj>mass)) && (arm < (xj-xi)*(mass-yi)/(yj-yi)+xi);
    if(inter) inside=!inside;
  }
  return inside;
}
function wbValid(){
  const r=computeWB();
  if(r.mass<=0) return false;
  if(r.mass > r.maxWeight+0.5) return false;
  const poly=P().wb.envelope;
  const tow = pointInPoly(r.cg, r.mass, poly);
  const zfw = r.zfMass>0 ? pointInPoly(r.zfCG, r.zfMass, poly) : true;
  return tow && zfw;
}

/* ====================================================================
   MÉTÉO / METAR
   ==================================================================== */
async function fetchMetar(icao){
  icao=(icao||"").trim().toUpperCase();
  if(icao.length<3) throw new Error("Code OACI invalide");
  // 1) tentative directe
  let m = await metarByIcao(icao);
  if(m) return {metar:m, fallback:false};
  // 2) repli : station la plus proche via coordonnées
  const coords = await stationCoords(icao);
  if(coords){
    const near = await nearestMetar(coords.lat, coords.lon);
    if(near) return {metar:near, fallback:true};
  }
  throw new Error("Aucun METAR trouvé (ni station de repli).");
}
async function metarByIcao(icao){
  try{
    const r=await fetch(`https://aviationweather.gov/api/data/metar?ids=${icao}&format=json`,{cache:"no-store"});
    const j=await r.json();
    if(Array.isArray(j)&&j.length&&j[0].rawOb) return j[0];
  }catch(e){}
  return null;
}
async function stationCoords(icao){
  try{
    const r=await fetch(`https://aviationweather.gov/api/data/stationinfo?ids=${icao}&format=json`,{cache:"no-store"});
    const j=await r.json();
    if(Array.isArray(j)&&j.length) return {lat:j[0].lat, lon:j[0].lon};
  }catch(e){}
  return null;
}
async function nearestMetar(lat,lon){
  const d=1.2;
  const bbox=`${(lat-d).toFixed(3)},${(lon-d).toFixed(3)},${(lat+d).toFixed(3)},${(lon+d).toFixed(3)}`;
  try{
    const r=await fetch(`https://aviationweather.gov/api/data/metar?format=json&bbox=${bbox}`,{cache:"no-store"});
    const j=await r.json();
    if(Array.isArray(j)&&j.length){
      j.forEach(s=>s._dist=Math.hypot((s.lat-lat),(s.lon-lon)));
      j.sort((a,b)=>a._dist-b._dist);
      return j[0];
    }
  }catch(e){}
  return null;
}
function applyMetar(m,which){
  // m : objet METAR aviationweather (wdir, wspd, temp, altim en hPa)
  if(which==="dep") state.meteo.rawDep=m.rawOb||""; else state.meteo.rawArr=m.rawOb||"";
  if(m.wdir!=null) state.meteo.windDir = (m.wdir==="VRB"?"VRB":Math.round(m.wdir));
  if(m.wspd!=null) state.meteo.windSpd = Math.round(m.wspd);
  if(m.temp!=null) state.meteo.temp = Math.round(m.temp*10)/10;
  if(m.altim!=null) state.meteo.qnh = Math.round(m.altim); // hPa
  saveState();
}

/* ====================================================================
   PERFORMANCES
   ==================================================================== */
function isaTempC(altFt){ return 15 - 1.98*(altFt/1000); }
function pressureAltFt(elevFt,qnh){ return elevFt + (1013.25-num(qnh,1013))*27; }
function densityAltFt(elevFt,qnh,oatC){
  const pa=pressureAltFt(elevFt,qnh);
  return pa + 120*(num(oatC,15)-isaTempC(pa));
}
function windComponents(rwyHdg, windDir, windSpd){
  if(windDir==="VRB"||windDir===""||windDir==null) return {head:0,cross:0,xdir:"—"};
  const ang=(num(windDir)-num(rwyHdg))*Math.PI/180;
  const head=num(windSpd)*Math.cos(ang);
  const cross=num(windSpd)*Math.sin(ang);
  return { head:head, cross:Math.abs(cross), xdir: cross>=0?"droite":"gauche" };
}
function computePerf(){
  const p=P(), pf=p.perf, ad=p.aerodrome;
  const wb=computeWB();
  const rwy=p.aerodrome.runways.find(r=>r.ident===state.perf.runway)||p.aerodrome.runways[0];
  const oat=num(state.meteo.temp, isaTempC(0));
  const qnh=num(state.meteo.qnh,1013);
  const da=densityAltFt(ad.elevFt,qnh,oat);
  const wc=windComponents(rwy.hdg, state.meteo.windDir, state.meteo.windSpd);
  const surfFactor=pf.surfaceFactors[state.perf.surface]||1;

  function dist(kind){
    const ref = kind==="to"? pf.takeoff : pf.landing;
    let base;
    if(state.perf.mode==="manuel"){
      base = num(kind==="to"? state.perf.manTO : state.perf.manLDG, 0);
      if(base<=0) base = ref.base50ft_m;
    }else{
      base = ref.base50ft_m;
      // altitude-densité
      base *= (1 + pf.kPer1000ft*(da/1000));
      // masse au-dessus de la réf (corrige aussi Cadet->Warrior)
      base *= (1 + pf.kPerKgOverRef*Math.max(0, wb.mass - ref.refMass));
    }
    // vent
    if(wc.head>=0) base *= (1 - pf.kHeadwindPerKt*wc.head);
    else base *= (1 + pf.kTailwindPerKt*Math.abs(wc.head));
    // piste
    base *= surfFactor;
    // marge sécurité
    base *= pf.safetyMargin;
    return Math.max(0, Math.round(base));
  }
  const toDist=dist("to"), ldgDist=dist("ldg");
  const toda=num(state.perf.toda,0), lda=num(state.perf.lda,0);
  return {
    da:Math.round(da), pa:Math.round(pressureAltFt(ad.elevFt,qnh)), oat, qnh,
    rwy, wc, surfFactor, toDist, ldgDist, toda, lda, wb,
    toOK: toda>0? toDist<=toda : null,
    ldgOK: lda>0? ldgDist<=lda : null,
    speeds:p.speeds, pf
  };
}

function envelopeSVG(r){
  const ax=P().wb.envelopeAxis, poly=P().wb.envelope;
  const W=320,H=240,pad=38;
  const sx=a=>pad+(a-ax.armMin)/(ax.armMax-ax.armMin)*(W-pad-10);
  const sy=m=>H-pad-(m-ax.massMin)/(ax.massMax-ax.massMin)*(H-pad-12);
  const pts=poly.map(p=>`${sx(p[0]).toFixed(1)},${sy(p[1]).toFixed(1)}`).join(" ");
  // grille
  let grid="";
  for(let a=2.10;a<=ax.armMax;a+=0.05){ const x=sx(a); grid+=`<line x1="${x}" y1="${pad-6}" x2="${x}" y2="${H-pad}" stroke="#1c2636"/>`; }
  for(let m=ax.massMin;m<=ax.massMax;m+=100){ const y=sy(m); grid+=`<line x1="${pad}" y1="${y}" x2="${W-10}" y2="${y}" stroke="#1c2636"/>`; }
  const towIn=pointInPoly(r.cg,r.mass,poly);
  const zfwIn=r.zfMass>0?pointInPoly(r.zfCG,r.zfMass,poly):true;
  const tow = r.mass>0? `<circle cx="${sx(r.cg)}" cy="${sy(r.mass)}" r="6" fill="${towIn?'#3ddc97':'#ff4d4d'}" stroke="#06210f"/>`:"";
  const zfw = r.zfMass>0? `<circle cx="${sx(r.zfCG)}" cy="${sy(r.zfMass)}" r="5" fill="${zfwIn?'#39b0ff':'#ff4d4d'}" stroke="#04121f"/>`:"";
  const link = (r.mass>0&&r.zfMass>0)? `<line x1="${sx(r.zfCG)}" y1="${sy(r.zfMass)}" x2="${sx(r.cg)}" y2="${sy(r.mass)}" stroke="#cbd5e6" stroke-width="2" stroke-dasharray="4 3"/>`:"";
  return `<svg viewBox="0 0 ${W} ${H}" width="100%">
    ${grid}
    <polygon points="${pts}" fill="rgba(61,220,151,.10)" stroke="#3ddc97" stroke-width="2.5"/>
    <line x1="${pad}" y1="${pad-6}" x2="${pad}" y2="${H-pad}" stroke="#3a4658"/>
    <line x1="${pad}" y1="${H-pad}" x2="${W-10}" y2="${H-pad}" stroke="#3a4658"/>
    <text x="${pad}" y="${H-12}" fill="#8a97ab" font-size="10">${ax.armMin}</text>
    <text x="${W-30}" y="${H-12}" fill="#8a97ab" font-size="10">${ax.armMax} m</text>
    <text x="6" y="${pad}" fill="#8a97ab" font-size="10">${ax.massMax}</text>
    <text x="6" y="${H-pad}" fill="#8a97ab" font-size="10">${ax.massMin} kg</text>
    ${link}${zfw}${tow}
  </svg>`;
}

let chkPhase = null;
function allPhases(){ return [...P().checklists, ...P().emergencies]; }
function renderChk(){
  const p=P();
  if(!chkPhase) chkPhase=p.checklists[0].id;
  const phase=allPhases().find(x=>x.id===chkPhase);
  const tabs = p.checklists.map(c=>`<button data-ph="${c.id}" class="${c.id===chkPhase?'on':''}">${c.title}</button>`).join("")
    + p.emergencies.map(c=>`<button data-ph="${c.id}" class="urg ${c.id===chkPhase?'on':''}">⚠ ${c.title}</button>`).join("");
  const realItems = phase.items.filter(it=>it.action!=="");
  const done = Object.keys(state.chk[chkPhase]||{}).filter(k=>state.chk[chkPhase][k]).length;
  const total = realItems.length;
  const pct = total? Math.round(done/total*100):0;

  main.innerHTML=`
  <div class="card">
    <h2>Checklists — ${esc(phase.title)}</h2>
    <div class="chk-tabs">${tabs}</div>
    ${phase.info?`<div class="chk-info">ℹ️ ${esc(phase.info)}</div>`:""}
    <div class="kv"><span class="k">Progression</span><span class="v">${done}/${total} items</span></div>
    <div class="progress"><i style="width:${pct}%"></i></div>
    <div id="chkList"></div>
    <button class="btn danger" id="chkReset" style="margin-top:6px">↺ Réinitialiser cette checklist</button>
  </div>
  <div class="card">
    <h2>Déclenchement automatique GPS</h2>
    <div class="kv"><span class="k">GPS</span><span class="v" id="gpsState">${gpsActive?'actif':'inactif'}</span></div>
    <div class="kv"><span class="k">Vitesse sol</span><span class="v" id="gpsGS">—</span></div>
    <div class="kv"><span class="k">Position</span><span class="v" id="gpsPos">—</span></div>
    <button class="btn accent" id="gpsBtn" style="margin-top:8px">${gpsActive?'Désactiver le suivi GPS':'Activer le suivi GPS'}</button>
    <div class="note" style="margin-top:8px">Roulage (>2 kt) · seuil de piste (<50 m) · approche destination. Pop-up + bip discret, bouton « Masquer ».</div>
  </div>`;

  const list=document.getElementById("chkList");
  let html="";
  phase.items.forEach((it,idx)=>{
    if(it.action===""){ html+=`<div class="muted" style="font-weight:800;font-size:12px;letter-spacing:.5px;margin:10px 0 6px;color:var(--accent2)">${esc(it.item)}</div>`; return; }
    const isDone=!!(state.chk[chkPhase]&&state.chk[chkPhase][idx]);
    html+=`<div class="chk-item ${isDone?'done':''}" data-idx="${idx}">
      <div class="box">✓</div>
      <div class="txt"><b>${esc(it.item)}</b><span>${esc(it.action)}</span></div>
    </div>`;
  });
  list.innerHTML=html;
  list.querySelectorAll(".chk-item").forEach(el=>{
    el.onclick=()=>{
      const idx=el.dataset.idx;
      state.chk[chkPhase]=state.chk[chkPhase]||{};
      state.chk[chkPhase][idx]=!state.chk[chkPhase][idx];
      saveState(); renderChk();
    };
  });
  document.querySelectorAll(".chk-tabs button").forEach(b=>b.onclick=()=>{chkPhase=b.dataset.ph;renderChk();});
  document.getElementById("chkReset").onclick=()=>{ state.chk[chkPhase]={}; saveState(); renderChk(); };
  document.getElementById("gpsBtn").onclick=toggleGPS;
}

/* ---------- GPS / déclenchement auto ---------- */
let gpsActive=false, gpsWatch=null, gpsLast=null, gpsTriggered={};
function toggleGPS(){
  if(gpsActive){ stopGPS(); return; }
  if(!navigator.geolocation){ alert("Géolocalisation non disponible."); return; }
  gpsWatch=navigator.geolocation.watchPosition(onGPS,onGPSErr,{enableHighAccuracy:true,maximumAge:1000,timeout:15000});
  gpsActive=true; renderChk();
}
function stopGPS(){ if(gpsWatch!=null) navigator.geolocation.clearWatch(gpsWatch); gpsActive=false; gpsWatch=null; if(currentTab==='chk') renderChk(); }
function onGPSErr(e){ const el=document.getElementById("gpsState"); if(el) el.textContent="erreur ("+e.message+")"; }
function onGPS(pos){
  const c=pos.coords;
  const gsKt = (c.speed!=null && isFinite(c.speed))? c.speed*1.94384 : null; // m/s -> kt
  gpsLast={lat:c.latitude,lon:c.longitude,alt:c.altitude,gs:gsKt,t:Date.now()};
  if(currentTab==='chk'){
    const gsEl=document.getElementById("gpsGS"), posEl=document.getElementById("gpsPos");
    if(gsEl) gsEl.textContent = gsKt!=null? gsKt.toFixed(0)+" kt" : "n/d";
    if(posEl) posEl.textContent = c.latitude.toFixed(4)+", "+c.longitude.toFixed(4);
  }
  evalTriggers();
}
function distM(lat1,lon1,lat2,lon2){
  const R=6371000,toR=x=>x*Math.PI/180;
  const dLat=toR(lat2-lat1),dLon=toR(lon2-lon1);
  const a=Math.sin(dLat/2)**2+Math.cos(toR(lat1))*Math.cos(toR(lat2))*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}
function evalTriggers(){
  if(!gpsLast) return;
  const p=P(), ad=p.aerodrome, g=p.gps;
  // 1) Roulage : GS > seuil et "avant mise en route" validée
  const avantOK = phaseComplete("avantmer");
  if(gpsLast.gs!=null && gpsLast.gs>g.taxiKt && avantOK && !gpsTriggered.roulage){
    gpsTriggered.roulage=true; popupChecklist("roulage","Vitesse sol détectée — ROULAGE");
  }
  // 2) Seuil de piste : < rayon autour d'un seuil de l'aérodrome de départ
  ad.runways.forEach(rw=>{
    const d=distM(gpsLast.lat,gpsLast.lon,rw.thrLat,rw.thrLon);
    if(d<g.thresholdRadiusM && !gpsTriggered.avantdec){
      gpsTriggered.avantdec=true; popupChecklist("avantdec","Seuil piste "+rw.ident+" — AVANT DÉCOLLAGE");
    }
  });
  // 3) Approche : altitude GPS proche de l'altitude terrain destination + décélération
  //    (best-effort, l'altitude GPS est peu fiable -> simple indication)
  if(gpsLast.alt!=null && gpsLast.gs!=null){
    const fieldM = ad.elevFt*0.3048;
    if(gpsLast.alt < fieldM+450 && gpsLast.gs<85 && gpsLast.gs>20 && phaseComplete("croisiere") && !gpsTriggered.approche){
      gpsTriggered.approche=true; popupChecklist("approche","Descente détectée — APPROCHE");
    }
  }
}
function phaseComplete(id){
  const ph=P().checklists.find(x=>x.id===id); if(!ph) return false;
  const real=ph.items.filter(it=>it.action!=="");
  const done=Object.keys(state.chk[id]||{}).filter(k=>state.chk[id][k]).length;
  return real.length>0 && done>=real.length;
}
/* pop-up + bip */
const gpspop=document.getElementById("gpspop");
let pendingPhase=null;
function beep(){
  try{
    const ac=new (window.AudioContext||window.webkitAudioContext)();
    const o=ac.createOscillator(),gnode=ac.createGain();
    o.frequency.value=880; o.connect(gnode); gnode.connect(ac.destination);
    gnode.gain.setValueAtTime(.0001,ac.currentTime);
    gnode.gain.exponentialRampToValueAtTime(.25,ac.currentTime+.02);
    gnode.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+.35);
    o.start(); o.stop(ac.currentTime+.36);
  }catch(e){}
}
function popupChecklist(phaseId,label){
  pendingPhase=phaseId;
  document.getElementById("gpspopTxt").textContent=label;
  gpspop.classList.remove("hide");
  beep();
  if(navigator.vibrate) navigator.vibrate(120);
}
document.getElementById("gpspopOpen").onclick=()=>{
  gpspop.classList.add("hide");
  if(pendingPhase){ chkPhase=pendingPhase; currentTab="chk";
    document.querySelectorAll("#nav button").forEach(x=>x.classList.toggle("on",x.dataset.tab==="chk"));
    render(); }
};
document.getElementById("gpspopHide").onclick=()=>gpspop.classList.add("hide");

/* signature */
let sigCanvas,sigCtx,sigDrawing=false;
function setupSigPad(){
  sigCanvas=document.getElementById("sigpad");
  const ratio=window.devicePixelRatio||1;
  const rect=sigCanvas.getBoundingClientRect();
  sigCanvas.width=rect.width*ratio; sigCanvas.height=rect.height*ratio;
  sigCtx=sigCanvas.getContext("2d");
  sigCtx.scale(ratio,ratio);
  sigCtx.lineWidth=2.4; sigCtx.lineCap="round"; sigCtx.strokeStyle="#0a0e14";
  if(state.sig){ const img=new Image(); img.onload=()=>sigCtx.drawImage(img,0,0,rect.width,rect.height); img.src=state.sig; }
  const pos=e=>{const rc=sigCanvas.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-rc.left,y:t.clientY-rc.top};};
  const start=e=>{e.preventDefault();sigDrawing=true;const pt=pos(e);sigCtx.beginPath();sigCtx.moveTo(pt.x,pt.y);};
  const move=e=>{if(!sigDrawing)return;e.preventDefault();const pt=pos(e);sigCtx.lineTo(pt.x,pt.y);sigCtx.stroke();};
  const end=()=>{sigDrawing=false;};
  sigCanvas.onpointerdown=start; sigCanvas.onpointermove=move; sigCanvas.onpointerup=end; sigCanvas.onpointerleave=end;
}
function clearSig(){ const rect=sigCanvas.getBoundingClientRect(); sigCtx.clearRect(0,0,rect.width,rect.height); state.sig=null; saveState(); document.getElementById("sigStatus").textContent="Non signée"; }

/* ====================================================================
   UTILITAIRES
   ==================================================================== */
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function fmt(n){ if(n==null||!isFinite(n)) return "0"; return (Math.round(n*10)/10).toLocaleString("fr-FR"); }
function bindInput(id,fn,live,after){
  const el=document.getElementById(id); if(!el) return;
  const handler=()=>{ fn(el.value); saveState(); if(live){ lockPerfTab(!wbValid()); if(after) after(); } };
  el.addEventListener("input",handler);
  el.addEventListener("change",()=>{ handler(); });
}

/* ====================================================================
   PWA : manifest (data-URI) + service worker (si servi en https)
   ==================================================================== */
(function(){
  const manifest={
    name:"EnVol EFB — F-GRLA", short_name:"EnVol EFB",
    start_url:".", scope:".", display:"standalone",
    background_color:"#0a0e14", theme_color:"#0a0e14",
    icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='108' fill='%230a0e14'/%3E%3Cpath d='M256 80 L426 374 L256 312 L86 374 Z' fill='%233ddc97'/%3E%3Ccircle cx='256' cy='426' r='26' fill='%233ddc97'/%3E%3C/svg%3E",sizes:"512x512",type:"image/svg+xml"}]
  };
  const blob=new Blob([JSON.stringify(manifest)],{type:"application/manifest+json"});
  const link=document.createElement("link"); link.rel="manifest"; link.href=URL.createObjectURL(blob);
  document.head.appendChild(link);

  // Service worker : nécessite un fichier sw.js servi en HTTP(S) (hébergement).
  // En ouverture file:// ou via "Sur l'écran d'accueil", iOS met déjà la page en cache.
  if("serviceWorker" in navigator && location.protocol.startsWith("http")){
    const swCode = `
      const C='envol-efb-v1';
      self.addEventListener('install',e=>{self.skipWaiting();});
      self.addEventListener('activate',e=>{self.clients.claim();});
      self.addEventListener('fetch',e=>{
        e.respondWith(
          caches.open(C).then(cache=>cache.match(e.request).then(r=>{
            const net=fetch(e.request).then(resp=>{ if(e.request.method==='GET'&&resp.ok) cache.put(e.request,resp.clone()); return resp;}).catch(()=>r);
            return r||net;
          }))
        );
      });`;
    try{
      const swUrl=URL.createObjectURL(new Blob([swCode],{type:"text/javascript"}));
      navigator.serviceWorker.register(swUrl).catch(()=>{/* blob SW non supporté : ignorer */});
    }catch(e){}
  }
})();
